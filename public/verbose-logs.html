<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLI Verbose 日志</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-soft: #162238;
      --text: #e5edf9;
      --muted: #8fa0bf;
      --border: #243553;
      --accent: #60a5fa;
      --accent-soft: rgba(96, 165, 250, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1a2740 0%, var(--bg) 55%);
      color: var(--text);
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .topbar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 650;
      letter-spacing: 0.2px;
    }

    .title-wrap p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .btn {
      background: var(--accent);
      color: #071326;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-weight: 650;
      cursor: pointer;
    }

    .layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 280px 360px 1fr;
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .list {
      overflow: auto;
      padding-right: 4px;
    }

    .item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      background: var(--panel-soft);
      transition: all 0.15s ease;
    }

    .item:hover,
    .item.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    pre {
      margin: 10px 0 0;
      flex: 1;
      min-height: 0;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0a1322;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      color: #dbe7fb;
      line-height: 1.45;
    }

    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
      .page { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="title-wrap">
        <h1>CLI Verbose 日志</h1>
        <p>查看各智能体 CLI 子进程日志、输出与错误信息。</p>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn" onclick="window.open('/deps-monitor.html', '_blank')">运维日志</button>
        <button class="btn" onclick="loadAgents()">刷新</button>
      </div>
    </header>

    <div class="layout">
      <section class="card">
        <h2>智能体</h2>
        <div id="agents" class="list"></div>
      </section>
      <section class="card">
        <h2>日志文件</h2>
        <div id="logs" class="list hint">请先选择智能体</div>
      </section>
      <section class="card">
        <h2>日志内容</h2>
        <div class="hint" id="current"></div>
        <pre id="content">请选择日志文件...</pre>
      </section>
    </div>
  </div>

  <script>
    const agentsEl = document.getElementById('agents');
    const logsEl = document.getElementById('logs');
    const contentEl = document.getElementById('content');
    const currentEl = document.getElementById('current');

    let selectedAgent = '';
    let selectedFile = '';

    function formatTime(ts) {
      return new Date(ts).toLocaleString('zh-CN');
    }

    async function loadAgents() {
      const res = await fetch('/api/verbose/agents', { credentials: 'include' });
      if (!res.ok) throw new Error('加载智能体日志失败');
      const data = await res.json();
      const agents = data.agents || [];
      if (agents.length === 0) {
        agentsEl.innerHTML = '<div class="hint">暂无日志</div>';
        logsEl.innerHTML = '<div class="hint">暂无日志</div>';
        contentEl.textContent = '暂无日志';
        return;
      }

      agentsEl.innerHTML = agents.map(agent => `
        <div class="item ${selectedAgent === agent.agent ? 'active' : ''}" onclick="selectAgent('${agent.agent}')">
          <div>${agent.agent}</div>
          <div class="meta">${agent.logCount} 个文件</div>
          <div class="meta">最新: ${formatTime(agent.latestUpdatedAt)}</div>
        </div>
      `).join('');

      if (!selectedAgent) {
        selectAgent(agents[0].agent);
      }
    }

    async function selectAgent(agent) {
      selectedAgent = agent;
      selectedFile = '';
      await loadLogs(agent);
      await loadAgents();
    }

    async function loadLogs(agent) {
      const res = await fetch(`/api/verbose/logs?agent=${encodeURIComponent(agent)}`, { credentials: 'include' });
      if (!res.ok) throw new Error('加载日志列表失败');
      const data = await res.json();
      const logs = data.logs || [];
      if (logs.length === 0) {
        logsEl.innerHTML = '<div class="hint">该智能体暂无日志</div>';
        return;
      }

      logsEl.innerHTML = logs.map(log => `
        <div class="item ${selectedFile === log.fileName ? 'active' : ''}" onclick="selectLog('${log.fileName}')">
          <div>${log.fileName}</div>
          <div class="meta">${(log.size / 1024).toFixed(1)} KB</div>
          <div class="meta">${formatTime(log.updatedAt)}</div>
        </div>
      `).join('');

      if (!selectedFile) {
        selectLog(logs[0].fileName);
      }
    }

    async function selectLog(fileName) {
      selectedFile = fileName;
      const res = await fetch(`/api/verbose/log-content?file=${encodeURIComponent(fileName)}`, { credentials: 'include' });
      if (!res.ok) throw new Error('加载日志内容失败');
      const data = await res.json();
      currentEl.textContent = `当前文件: ${data.fileName}`;
      contentEl.textContent = data.content || '(空文件)';
      await loadLogs(selectedAgent);
    }

    loadAgents().catch(err => {
      contentEl.textContent = err.message;
    });
  </script>
</body>
</html>
