<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bot Room">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>多 AI 智能体聊天室</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-overlay" id="authOverlay" style="display: none;">
    <div class="auth-card">
      <h2>🔐 访问受保护</h2>
      <p>请输入用户名和密码以进入 bot-room。</p>
      <form onsubmit="submitLogin(event)">
        <input type="text" id="usernameInput" placeholder="输入用户名" autocomplete="username" required>
        <input type="password" id="passwordInput" placeholder="输入密码" autocomplete="current-password" required>
        <button type="submit" id="loginBtn">登录</button>
      </form>
      <p class="auth-error" id="authError"></p>
    </div>
  </div>

  <div class="container">
    <!-- 标题栏 -->
    <header class="header">
      <h1>🤖 多 AI 智能体聊天室</h1>
      <div class="header-actions">
        <span class="status" id="status">已连接</span>
        <button class="btn-clear" id="logoutBtn" onclick="logout()" style="display: none;">退出登录</button>
        <button class="btn-clear" onclick="window.open('/verbose-logs.html', '_blank')">Verbose日志</button>
        <button class="btn-clear" onclick="clearHistory()">清空历史</button>
      </div>
    </header>

    <!-- 智能体列表 -->
    <div class="agents-bar" id="agentsBar">
      <span class="agents-label">智能体:</span>
      <div class="agents-list" id="agentsList"></div>
    </div>

    <div class="sessions-bar">
      <span class="sessions-label">会话:</span>
      <select id="sessionSelect"></select>
      <button class="btn-session" onclick="createSession()">新建</button>
      <button class="btn-session" onclick="renameSession()">重命名</button>
      <button class="btn-session btn-session--danger" onclick="deleteSession()">删除</button>
    </div>

    <!-- 当前对话智能体提示 -->
    <div class="current-agent-bar" id="currentAgentBar" style="display: none;">
      <span class="current-agent-label">当前对话:</span>
      <span class="current-agent-name" id="currentAgentName"></span>
      <button class="btn-switch" onclick="switchAgent()">切换</button>
    </div>

    <!-- 消息列表 -->
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon">💬</div>
        <h2>欢迎使用 AI 智能体聊天室</h2>
        <p class="hint">点击下方智能体标签， 或使用 <code>@智能体名</code> 开始对话</p>
        <div class="welcome-agents">
          <span class="welcome-agent" onclick="selectAgent('Claude')">🤖 Claude</span>
          <span class="welcome-agent" onclick="selectAgent('Alice')">👩‍💻 Alice</span>
          <span class="welcome-agent" onclick="selectAgent('Bob')">🧑‍💻 Bob</span>
        </div>
        <p class="hint secondary">✨ @ 一次后，后续消息会自动发送给该智能体</p>
      </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
      <form onsubmit="sendMessage(event)">
        <div class="mention-input-wrap">
          <input
            type="text"
            id="userInput"
            placeholder="输入消息... 使用 @智能体名 来召唤 AI"
            autocomplete="off"
            autofocus
          >
          <div class="mention-suggestions" id="mentionSuggestions" style="display: none;"></div>
        </div>
        <button type="submit" id="sendBtn">发送</button>
      </form>
    </div>
  </div>

  <script>
    // ============================================
    // 状态管理
    // ============================================
    let history = [];
    let agents = [];
    let isLoading = false;
    let currentAgent = null;  // 当前对话的智能体
    let chatSessions = [];
    let activeSessionId = null;

    // DOM 元素
    const messagesEl = document.getElementById('messages');
    const userInputEl = document.getElementById('userInput');
    const sendBtnEl = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');
    const agentsListEl = document.getElementById('agentsList');
    const currentAgentBarEl = document.getElementById('currentAgentBar');
    const currentAgentNameEl = document.getElementById('currentAgentName');
    const authOverlayEl = document.getElementById('authOverlay');
    const usernameInputEl = document.getElementById('usernameInput');
    const passwordInputEl = document.getElementById('passwordInput');
    const authErrorEl = document.getElementById('authError');
    const logoutBtnEl = document.getElementById('logoutBtn');
    const mentionSuggestionsEl = document.getElementById('mentionSuggestions');
    const sessionSelectEl = document.getElementById('sessionSelect');

    let mentionState = {
      visible: false,
      items: [],
      selectedIndex: 0,
      tokenStart: -1
    };

    let authEnabled = false;

    async function checkAuthStatus() {
      const response = await fetch('/api/auth-status', { credentials: 'include' });
      if (!response.ok) {
        throw new Error('鉴权状态检查失败');
      }
      const data = await response.json();
      authEnabled = data.authEnabled;
      const authenticated = data.authenticated;
      authOverlayEl.style.display = authEnabled && !authenticated ? 'flex' : 'none';
      logoutBtnEl.style.display = authEnabled && authenticated ? 'inline-flex' : 'none';
      return !authEnabled || authenticated;
    }

    async function submitLogin(event) {
      event.preventDefault();
      authErrorEl.textContent = '';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            username: usernameInputEl.value.trim(),
            password: passwordInputEl.value
          })
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({ error: '登录失败' }));
          throw new Error(data.error || '登录失败');
        }

        usernameInputEl.value = '';
        passwordInputEl.value = '';
        authOverlayEl.style.display = 'none';
        logoutBtnEl.style.display = 'inline-flex';
        await loadAgents();
        await loadHistory();
      } catch (error) {
        authErrorEl.textContent = error.message;
      }
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST', credentials: 'include' });
      history = [];
      chatSessions = [];
      activeSessionId = null;
      messagesEl.innerHTML = '';
      await checkAuthStatus();
    }

    function renderSessionList() {
      sessionSelectEl.innerHTML = chatSessions.map(session => `
        <option value="${session.id}" ${session.id === activeSessionId ? 'selected' : ''}>
          ${escapeHtml(session.name)} (${session.messageCount})
        </option>
      `).join('');
    }

    async function switchSession(sessionId) {
      if (!sessionId || sessionId === activeSessionId || isLoading) return;
      const response = await fetch('/api/sessions/select', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ sessionId })
      });
      if (!response.ok) {
        alert('切换会话失败');
        renderSessionList();
        return;
      }
      const data = await response.json();
      history = data.messages || [];
      currentAgent = data.currentAgent || null;
      activeSessionId = data.activeSessionId || null;
      chatSessions = data.chatSessions || [];
      renderSessionList();
      updateCurrentAgentUI();
      renderMessages();
    }

    async function createSession() {
      const name = prompt('请输入新会话名称（可选）') || '';
      const response = await fetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ name })
      });
      if (!response.ok) {
        alert('创建会话失败');
        return;
      }
      await loadHistory();
    }

    async function renameSession() {
      if (!activeSessionId) return;
      const current = chatSessions.find(item => item.id === activeSessionId);
      const name = prompt('请输入新的会话名称', current ? current.name : '');
      if (name === null) return;

      const response = await fetch('/api/sessions/rename', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ sessionId: activeSessionId, name })
      });
      if (!response.ok) {
        alert('重命名失败');
        return;
      }

      const data = await response.json();
      chatSessions = data.chatSessions || chatSessions;
      renderSessionList();
    }

    async function deleteSession() {
      if (!activeSessionId) return;
      if (!confirm('确定删除当前会话吗？该会话中的消息将丢失。')) return;

      const response = await fetch('/api/sessions/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ sessionId: activeSessionId })
      });

      const data = await response.json();
      if (!response.ok) {
        alert(data.error || '删除失败');
        return;
      }

      history = data.messages || [];
      currentAgent = data.currentAgent || null;
      activeSessionId = data.activeSessionId || null;
      chatSessions = data.chatSessions || [];
      renderSessionList();
      updateCurrentAgentUI();
      renderMessages();
    }

    // ============================================
    // 初始化
    // ============================================

    // 加载智能体列表
    async function loadAgents() {
      try {
        const response = await fetch('/api/agents', { credentials: 'include' });
        if (response.ok) {
          const data = await response.json();
          agents = data.agents || [];
          renderAgentsList();
        }
      } catch (error) {
        console.error('加载智能体失败:', error);
      }
    }

    // 渲染智能体列表
    function renderAgentsList() {
      agentsListEl.innerHTML = agents.map(agent => `
        <span class="agent-tag" style="--agent-color: ${agent.color}" title="@${agent.name}" onclick="selectAgent('${agent.name}')">
          ${agent.avatar} ${agent.name}
        </span>
      `).join('');
    }

    // 选择智能体
    function selectAgent(name) {
      const agent = agents.find(a => a.name === name);
      if (agent) {
        userInputEl.value = `@${name} ` + userInputEl.value;
        userInputEl.focus();
      }
    }

    function getMentionCandidates() {
      const list = agents.map(agent => ({
        type: 'agent',
        name: agent.name,
        avatar: agent.avatar,
        color: agent.color
      }));

      list.unshift({
        type: 'all',
        name: '所有人',
        alias: 'all',
        avatar: '📣',
        color: '#ec4899'
      });

      return list;
    }

    function hideMentionSuggestions() {
      mentionState.visible = false;
      mentionSuggestionsEl.style.display = 'none';
      mentionSuggestionsEl.innerHTML = '';
    }

    function renderMentionSuggestions() {
      if (!mentionState.visible || mentionState.items.length === 0) {
        hideMentionSuggestions();
        return;
      }

      mentionSuggestionsEl.style.display = 'block';
      mentionSuggestionsEl.innerHTML = mentionState.items.map((item, index) => {
        const selectedClass = index === mentionState.selectedIndex ? 'mention-suggestion--active' : '';
        const secondary = item.type === 'all' ? '<span class="mention-suggestion__desc">@all</span>' : '<span class="mention-suggestion__desc">智能体</span>';

        return `
          <button
            type="button"
            class="mention-suggestion ${selectedClass}"
            data-index="${index}"
            onclick="selectMentionSuggestion(${index})"
          >
            <span class="mention-suggestion__main">
              <span class="mention-suggestion__avatar">${item.avatar}</span>
              <span class="mention-suggestion__name" style="color: ${item.color};">@${escapeHtml(item.name)}</span>
            </span>
            ${secondary}
          </button>
        `;
      }).join('');
    }

    function updateMentionSuggestions() {
      const value = userInputEl.value;
      const cursor = userInputEl.selectionStart ?? value.length;
      const beforeCursor = value.slice(0, cursor);
      const atIndex = beforeCursor.lastIndexOf('@');

      if (atIndex < 0) {
        hideMentionSuggestions();
        return;
      }

      const prefix = beforeCursor.slice(atIndex + 1);
      if (/\s/.test(prefix) || prefix.includes('@')) {
        hideMentionSuggestions();
        return;
      }

      const normalizedPrefix = prefix.toLowerCase();
      const allCandidates = getMentionCandidates();
      const filtered = allCandidates.filter(item => {
        const names = [item.name, item.alias || ''];
        return names.some(name => name.toLowerCase().startsWith(normalizedPrefix));
      });

      if (filtered.length === 0) {
        hideMentionSuggestions();
        return;
      }

      mentionState.visible = true;
      mentionState.items = filtered;
      mentionState.selectedIndex = 0;
      mentionState.tokenStart = atIndex;
      renderMentionSuggestions();
    }

    function applyMentionSuggestion(index) {
      const item = mentionState.items[index];
      if (!item) return;

      const value = userInputEl.value;
      const cursor = userInputEl.selectionStart ?? value.length;
      const before = value.slice(0, mentionState.tokenStart);
      const after = value.slice(cursor);
      const mentionText = `@${item.name} `;

      userInputEl.value = `${before}${mentionText}${after}`;
      const nextCursor = (before + mentionText).length;
      userInputEl.setSelectionRange(nextCursor, nextCursor);
      hideMentionSuggestions();
      userInputEl.focus();
    }

    function selectMentionSuggestion(index) {
      applyMentionSuggestion(index);
    }

    // 切换智能体
    function switchAgent() {
      currentAgent = null;
      updateCurrentAgentUI();
      userInputEl.placeholder = '输入消息... 使用 @智能体名 来召唤 AI';
    }

    // 更新当前智能体 UI
    function updateCurrentAgentUI() {
      if (currentAgent) {
        const agent = agents.find(a => a.name === currentAgent);
        currentAgentBarEl.style.display = 'flex';
        currentAgentNameEl.textContent = `${agent ? agent.avatar : '🤖'} ${currentAgent}`;
        currentAgentNameEl.style.color = agent ? agent.color : '#888';
        userInputEl.placeholder = `发送消息给 ${currentAgent}... (输入 @其他智能体 可切换)`;
      } else {
        currentAgentBarEl.style.display = 'none';
        userInputEl.placeholder = '输入消息... 使用 @智能体名 来召唤 AI';
      }
    }

    // ============================================
    // 渲染函数
    // ============================================

    /**
     * 获取智能体信息
     */
    function getAgentInfo(name) {
      return agents.find(a => a.name === name);
    }

    /**
     * 获取发送者颜色
     */
    function getSenderColor(sender, role) {
      if (role === 'user') return null;
      const agent = getAgentInfo(sender);
      return agent ? agent.color : null;
    }

    /**
     * 获取发送者头像
     */
    function getSenderAvatar(sender, role) {
      if (role === 'user') return '👤';
      const agent = getAgentInfo(sender);
      return agent ? agent.avatar : '🤖';
    }

    /**
     * 渲染单个 card 块
     */
    function renderCard(block) {
      const toneClass = `card--${block.tone || 'info'}`;
      const icon = {
        info: 'ℹ️',
        success: '✅',
        warning: '⚠️'
      }[block.tone] || 'ℹ️';

      return `
        <div class="card ${toneClass}">
          <div class="card__icon">${icon}</div>
          <div class="card__content">
            <div class="card__title">${escapeHtml(block.title)}</div>
            <div class="card__body">${escapeHtml(block.body)}</div>
          </div>
        </div>
      `;
    }

    /**
     * 渲染单个 checklist 块
     */
    function renderChecklist(block) {
      const items = block.items || [];
      const doneCount = items.filter(item => item.done).length;

      return `
        <div class="checklist">
          <div class="checklist__header">
            <span class="checklist__title">${escapeHtml(block.title)}</span>
            <span class="checklist__count">${doneCount}/${items.length}</span>
          </div>
          <ul class="checklist__items">
            ${items.map(item => `
              <li class="checklist__item ${item.done ? 'checklist__item--done' : ''}">
                <span class="checklist__checkbox">${item.done ? '☑' : '☐'}</span>
                <span class="checklist__text">${escapeHtml(item.text)}</span>
              </li>
            `).join('')}
          </ul>
        </div>
      `;
    }

    /**
     * 渲染 rich blocks
     */
    function renderBlocks(blocks) {
      if (!blocks || blocks.length === 0) return '';

      return blocks.map(block => {
        switch (block.kind) {
          case 'card':
            return renderCard(block);
          case 'checklist':
            return renderChecklist(block);
          default:
            return `<div class="unknown-block">[未知块: ${block.kind}]</div>`;
        }
      }).join('');
    }

    /**
     * 高亮 @ 提及
     */
    function highlightMentions(text) {
      return text.replace(/@(\w+)/g, '<span class="mention">@$1</span>');
    }

    /**
     * 渲染一条消息
     */
    function renderMessage(msg) {
      const isUser = msg.role === 'user';
      const roleClass = isUser ? 'message--user' : 'message--assistant';
      const senderColor = getSenderColor(msg.sender, msg.role);
      const avatar = getSenderAvatar(msg.sender, msg.role);

      const colorStyle = senderColor ? `style="--sender-color: ${senderColor}"` : '';

      let content = '';

      if (isUser) {
        content = `<div class="message__text">${highlightMentions(escapeHtml(msg.text || ''))}</div>`;
      } else {
        content = `
          <div class="message__sender" ${colorStyle}>${escapeHtml(msg.sender || 'AI')}</div>
          <div class="message__text">${escapeHtml(msg.text || '')}</div>
          <div class="message__blocks">${renderBlocks(msg.blocks)}</div>
        `;
      }

      return `
        <div class="message ${roleClass}" ${colorStyle}>
          <div class="message__avatar">${avatar}</div>
          <div class="message__content">${content}</div>
        </div>
      `;
    }

    /**
     * 渲染加载中状态
     */
    function renderLoading(agentName) {
      const agent = getAgentInfo(agentName);
      const avatar = agent ? agent.avatar : '🤖';
      const color = agent ? agent.color : '#888';

      return `
        <div class="message message--assistant message--loading" style="--sender-color: ${color}">
          <div class="message__avatar">${avatar}</div>
          <div class="message__content">
            <div class="message__sender" style="--sender-color: ${color}">${agentName}</div>
            <div class="message__text">
              <span class="loading-dots">
                <span>.</span><span>.</span><span>.</span>
              </span>
            </div>
          </div>
        </div>
      `;
    }

    /**
     * 渲染所有消息
     */
    function renderMessages() {
      messagesEl.innerHTML = '';
      history.forEach(msg => {
        messagesEl.innerHTML += renderMessage(msg);
      });
      scrollToBottom();
    }

    /**
     * 添加单条消息
     */
    function addMessage(msg) {
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();

      messagesEl.innerHTML += renderMessage(msg);
      scrollToBottom();
    }

    /**
     * 显示/隐藏加载状态
     */
    function setLoading(loading, agentName = null) {
      isLoading = loading;

      if (loading) {
        sendBtnEl.disabled = true;
        sendBtnEl.textContent = '...';
        messagesEl.innerHTML += renderLoading(agentName || 'AI');
        scrollToBottom();
      } else {
        sendBtnEl.disabled = false;
        sendBtnEl.textContent = '发送';
        const loadingEl = messagesEl.querySelector('.message--loading');
        if (loadingEl) loadingEl.remove();
      }
    }

    /**
     * 滚动到底部
     */
    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    /**
     * HTML 转义
     */
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML.replace(/\n/g, '<br>');
    }

    // ============================================
    // API 调用
    // ============================================

    /**
     * 发送消息（流式响应）
     */
    async function sendMessage(event) {
      event.preventDefault();

      if (isLoading) return;

      const text = userInputEl.value.trim();
      if (!text) return;

      // 清空输入框
      userInputEl.value = '';

      // 显示用户消息
      const userMsg = { role: 'user', sender: '用户', text: text };
      addMessage(userMsg);
      history.push(userMsg);

      isLoading = true;
      sendBtnEl.disabled = true;
      sendBtnEl.textContent = '...';
      statusEl.textContent = '发送中...';

      // 当前正在思考的智能体列表
      const thinkingAgents = new Set();

      try {
        const response = await fetch('/api/chat-stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ message: text })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || ''; // 保留未完成的行

          let eventType = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) {
              eventType = line.substring(7).trim();
            } else if (line.startsWith('data: ')) {
              const dataStr = line.substring(6);
              try {
                const data = JSON.parse(dataStr);

                if (eventType === 'user_message') {
                  // 用户消息已确认
                  statusEl.textContent = '处理中...';
                } else if (eventType === 'agent_thinking') {
                  // 智能体开始思考
                  const agentName = data.agent;
                  thinkingAgents.add(agentName);
                  statusEl.textContent = `${agentName} 思考中...`;
                  showThinkingIndicator(agentName);
                } else if (eventType === 'agent_message') {
                  // 智能体回复完成，立即显示
                  thinkingAgents.delete(data.sender);
                  hideThinkingIndicator(data.sender);
                  history.push(data);
                  addMessage(data);
                  statusEl.textContent = thinkingAgents.size > 0
                    ? `${Array.from(thinkingAgents).join(', ')} 思考中...`
                    : '已连接';
                } else if (eventType === 'done') {
                  // 所有回复完成
                  if (data.currentAgent) {
                    currentAgent = data.currentAgent;
                    updateCurrentAgentUI();
                  }
                } else if (eventType === 'error') {
                  addMessage({
                    role: 'assistant',
                    sender: '系统',
                    text: `❌ 错误: ${data.error}`
                  });
                }
              } catch (e) {
                console.error('解析 SSE 数据失败:', e);
              }
              eventType = ''; // 重置事件类型
            }
          }
        }

      } catch (error) {
        console.error('发送失败:', error);
        statusEl.textContent = '连接失败';

        addMessage({
          role: 'assistant',
          sender: '系统',
          text: `❌ 发送失败: ${error.message}`
        });
      } finally {
        isLoading = false;
        sendBtnEl.disabled = false;
        sendBtnEl.textContent = '发送';
        // 清理所有思考指示器
        document.querySelectorAll('.message--thinking').forEach(el => el.remove());
      }
    }

    /**
     * 显示智能体思考指示器
     */
    function showThinkingIndicator(agentName) {
      const agent = agents.find(a => a.name === agentName);
      const avatar = agent ? agent.avatar : '🤖';
      const color = agent ? agent.color : '#888';

      const thinkingHtml = `
        <div class="message message--assistant message--thinking" data-agent="${agentName}" style="--sender-color: ${color}">
          <div class="message__avatar">${avatar}</div>
          <div class="message__content">
            <div class="message__sender" style="--sender-color: ${color}">${agentName}</div>
            <div class="message__text">
              <span class="loading-dots">
                <span>.</span><span>.</span><span>.</span>
              </span>
            </div>
          </div>
        </div>
      `;
      messagesEl.insertAdjacentHTML('beforeend', thinkingHtml);
      scrollToBottom();
    }

    /**
     * 隐藏智能体思考指示器
     */
    function hideThinkingIndicator(agentName) {
      const thinkingEl = messagesEl.querySelector(`.message--thinking[data-agent="${agentName}"]`);
      if (thinkingEl) thinkingEl.remove();
    }

    /**
     * 加载历史记录
     */
    async function loadHistory() {
      try {
        const response = await fetch('/api/history', { credentials: 'include' });
        if (response.ok) {
          const data = await response.json();
          history = data.messages || [];
          if (data.agents) {
            agents = data.agents;
            renderAgentsList();
          }
          if (data.currentAgent) {
            currentAgent = data.currentAgent;
            updateCurrentAgentUI();
          } else {
            currentAgent = null;
            updateCurrentAgentUI();
          }
          chatSessions = data.chatSessions || [];
          activeSessionId = data.activeSessionId || null;
          renderSessionList();
          renderMessages();
        }
      } catch (error) {
        console.error('加载历史失败:', error);
      }
    }

    /**
     * 清空历史
     */
    async function clearHistory() {
      if (!confirm('确定要清空所有聊天记录吗?')) return;

      try {
        const response = await fetch('/api/clear', { method: 'POST', credentials: 'include' });
        const data = await response.json();
        history = [];
        currentAgent = data.currentAgent;  // 重置为 null
        updateCurrentAgentUI();
        messagesEl.innerHTML = `
          <div class="welcome">
            <p>👋 欢迎来到多 AI 智能体聊天室!</p>
            <p class="hint">试试 @ 提及来召唤 AI 智能体:</p>
            <p class="hint examples">
              <em>@Claude 你好</em> |
              <em>@Alice 帮我列个待办</em> |
              <em>@Bob 有什么建议?</em>
            </p>
            <p class="hint secondary">@ 一次后，后续消息会自动发送给同一个 AI</p>
          </div>
        `;
      } catch (error) {
        console.error('清空失败:', error);
        alert('清空失败: ' + error.message);
      }
    }

    // ============================================
    // 初始化
    // ============================================

    window.addEventListener('load', async () => {
      const canAccess = await checkAuthStatus().catch(() => false);
      if (canAccess) {
        await loadAgents();
        await loadHistory();
      }
      userInputEl.focus();

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js').catch((err) => {
          console.warn('Service Worker 注册失败', err);
        });
      }
    });

    // 回车发送
    userInputEl.addEventListener('input', () => {
      updateMentionSuggestions();
    });

    userInputEl.addEventListener('blur', () => {
      setTimeout(() => hideMentionSuggestions(), 120);
    });

    userInputEl.addEventListener('keydown', (e) => {
      if (mentionState.visible && mentionState.items.length > 0) {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          mentionState.selectedIndex = (mentionState.selectedIndex + 1) % mentionState.items.length;
          renderMentionSuggestions();
          return;
        }

        if (e.key === 'ArrowUp') {
          e.preventDefault();
          mentionState.selectedIndex = (mentionState.selectedIndex - 1 + mentionState.items.length) % mentionState.items.length;
          renderMentionSuggestions();
          return;
        }

        if (e.key === 'Enter' || e.key === 'Tab') {
          e.preventDefault();
          applyMentionSuggestion(mentionState.selectedIndex);
          return;
        }

        if (e.key === 'Escape') {
          e.preventDefault();
          hideMentionSuggestions();
          return;
        }
      }

      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(e);
      }
    });

    sessionSelectEl.addEventListener('change', (e) => {
      switchSession(e.target.value);
    });
  </script>
</body>
</html>
