<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bot Room">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>Bot Room - 多 AI 智能体聊天室</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const welcomeAgents = [
      { name: 'Claude', icon: '🤖' },
      { name: 'Codex架构师', icon: '🏗️' },
      { name: 'Alice', icon: '👩‍💻' },
      { name: 'Bob', icon: '🧑‍💻' }
    ];

    const WelcomeBlock = () => (
      <div className="welcome">
        <div className="welcome-icon">💬</div>
        <h2>欢迎使用 Bot Room</h2>
        <p>点击下方智能体或使用 <em>@智能体名</em> 开始对话</p>
        <div className="welcome-agents">
          {welcomeAgents.map((agent) => (
            <span
              key={agent.name}
              className="welcome-agent"
              onClick={() => window.selectAgent && window.selectAgent(agent.name)}
            >
              {agent.icon} {agent.name}
            </span>
          ))}
        </div>
        <p className="hint secondary">@ 一次后，后续消息会自动发送给该智能体</p>
      </div>
    );

    const App = () => (
      <>
        <div className="auth-overlay" id="authOverlay" style={{ display: 'none' }}>
          <div className="auth-card">
            <h2>访问验证</h2>
            <p>请输入凭据以继续访问</p>
            <form onSubmit={(event) => window.submitLogin && window.submitLogin(event)}>
              <input type="text" id="usernameInput" placeholder="用户名" autoComplete="username" required />
              <input type="password" id="passwordInput" placeholder="密码" autoComplete="current-password" required />
              <button type="submit" id="loginBtn">登录</button>
            </form>
            <p className="auth-error" id="authError"></p>
          </div>
        </div>

        <div className="container">
          <aside className="sessions-sidebar">
            <div className="sessions-label">会话蓝图</div>
            <select id="sessionSelect" size="14"></select>
            <button className="btn-session" onClick={() => window.createSession && window.createSession()}>新建会话</button>
            <button className="btn-session" onClick={() => window.renameSession && window.renameSession()}>重命名</button>
            <button className="btn-session btn-session--danger" onClick={() => window.deleteSession && window.deleteSession()}>删除</button>
          </aside>

          <div className="main-layout">
            <div className="chat-panel">
              <header className="header">
                <h1>Bot Room · Blueprint</h1>
                <div className="header-actions">
                  <span className="status" id="status">已连接</span>
                  <button className="btn-clear btn-mobile-session" onClick={() => window.openSessionManager && window.openSessionManager()}>会话</button>
                  <button className="btn-clear" id="loginBtnHeader" style={{ display: 'none' }} onClick={() => window.showLoginOverlay && window.showLoginOverlay()}>登录</button>
                  <button className="btn-clear" id="logoutBtn" style={{ display: 'none' }} onClick={() => window.logout && window.logout()}>退出</button>
                  <button className="btn-clear" onClick={() => window.open('/verbose-logs.html', '_blank')}>CLI日志</button>
                  <button className="btn-clear" onClick={() => window.open('/deps-monitor.html', '_blank')}>运维日志</button>
                  <button className="btn-clear" onClick={() => window.clearHistory && window.clearHistory()}>清空</button>
                </div>
              </header>

              <div className="pwa-banner" id="pwaBanner" style={{ display: 'none' }}>
                <span id="pwaBannerText">安装 Bot Room 到主屏幕，获得更好的 iOS 全屏体验。</span>
                <div className="pwa-banner__actions">
                  <button className="btn-clear" id="pwaInstallBtn" style={{ display: 'none' }}>安装</button>
                  <button className="btn-clear" onClick={() => window.dismissPwaBanner && window.dismissPwaBanner()}>关闭</button>
                </div>
              </div>

              <div className="agents-bar">
                <span className="agents-label">智能体</span>
                <div className="agents-list" id="agentsList"></div>
              </div>

              <div className="current-agent-bar" id="currentAgentBar" style={{ display: 'none' }}>
                <span className="current-agent-label">当前对话</span>
                <span className="current-agent-name" id="currentAgentName"></span>
                <button className="btn-switch" onClick={() => window.switchAgent && window.switchAgent()}>切换</button>
              </div>
              <div className="current-agent-bar" id="workdirBar" style={{ display: 'none' }}>
                <span className="current-agent-label">工作目录</span>
                <select id="chatWorkdirSelect"></select>
                <button className="btn-switch" onClick={() => window.applyAgentWorkdir && window.applyAgentWorkdir()}>应用</button>
              </div>

              <div className="messages" id="messages">
                <WelcomeBlock />
              </div>

              <div className="input-area">
                <form onSubmit={(event) => window.sendMessage && window.sendMessage(event)}>
                  <div className="mention-input-wrap">
                    <input
                      type="text"
                      id="userInput"
                      placeholder="输入消息... 使用 @智能体名 召唤 AI"
                      autoComplete="off"
                      autoFocus
                    />
                    <div className="mention-suggestions" id="mentionSuggestions" style={{ display: 'none' }}></div>
                  </div>
                  <button type="submit" id="sendBtn">发送</button>
                </form>
              </div>
            </div>
          </div>
        </div>

        <div className="session-sheet-backdrop" id="sessionSheetBackdrop" style={{ display: 'none' }} onClick={(event) => window.closeSessionManager && window.closeSessionManager(event)}>
          <aside className="session-sheet" role="dialog" aria-label="会话管理" onClick={(event) => event.stopPropagation()}>
            <div className="session-sheet__header">
              <h2>会话管理</h2>
              <button className="btn-clear" onClick={() => window.closeSessionManager && window.closeSessionManager()}>完成</button>
            </div>
            <select id="sessionSelectMobile" size="10"></select>
            <div className="session-sheet__actions">
              <button className="btn-session" onClick={() => window.createSession && window.createSession()}>新建会话</button>
              <button className="btn-session" onClick={() => window.renameSession && window.renameSession()}>重命名</button>
              <button className="btn-session btn-session--danger" onClick={() => window.deleteSession && window.deleteSession()}>删除会话</button>
            </div>
          </aside>
        </div>
      </>
    );

    const appRoot = ReactDOM.createRoot(document.getElementById('app'));
    ReactDOM.flushSync(() => {
      appRoot.render(<App />);
    });
  </script>

  <script>
    // ============================================
    // 状态管理
    // ============================================
    let history = [];
    let agents = [];
    let isLoading = false;
    let currentAgent = null;
    let chatSessions = [];
    let activeSessionId = null;
    let agentWorkdirs = {};
    let workdirOptions = [];

    // DOM 元素
    let messagesEl;
    let userInputEl;
    let sendBtnEl;
    let statusEl;
    let agentsListEl;
    let currentAgentBarEl;
    let currentAgentNameEl;
    let workdirBarEl;
    let chatWorkdirSelectEl;
    let authOverlayEl;
    let usernameInputEl;
    let passwordInputEl;
    let authErrorEl;
    let logoutBtnEl;
    let loginBtnHeaderEl;
    let mentionSuggestionsEl;
    let sessionSelectEl;
    let sessionSelectMobileEl;
    let sessionSheetBackdropEl;
    let pwaBannerEl;
    let pwaBannerTextEl;
    let pwaInstallBtnEl;

    function cacheDomElements() {
      messagesEl = document.getElementById('messages');
      userInputEl = document.getElementById('userInput');
      sendBtnEl = document.getElementById('sendBtn');
      statusEl = document.getElementById('status');
      agentsListEl = document.getElementById('agentsList');
      currentAgentBarEl = document.getElementById('currentAgentBar');
      currentAgentNameEl = document.getElementById('currentAgentName');
      workdirBarEl = document.getElementById('workdirBar');
      chatWorkdirSelectEl = document.getElementById('chatWorkdirSelect');
      authOverlayEl = document.getElementById('authOverlay');
      usernameInputEl = document.getElementById('usernameInput');
      passwordInputEl = document.getElementById('passwordInput');
      authErrorEl = document.getElementById('authError');
      logoutBtnEl = document.getElementById('logoutBtn');
      loginBtnHeaderEl = document.getElementById('loginBtnHeader');
      mentionSuggestionsEl = document.getElementById('mentionSuggestions');
      sessionSelectEl = document.getElementById('sessionSelect');
      sessionSelectMobileEl = document.getElementById('sessionSelectMobile');
      sessionSheetBackdropEl = document.getElementById('sessionSheetBackdrop');
      pwaBannerEl = document.getElementById('pwaBanner');
      pwaBannerTextEl = document.getElementById('pwaBannerText');
      pwaInstallBtnEl = document.getElementById('pwaInstallBtn');
    }

    let deferredInstallPrompt = null;

    let mentionState = {
      visible: false,
      items: [],
      selectedIndex: 0,
      tokenStart: -1
    };

    let authEnabled = false;
    let isAuthenticated = false;

    async function checkAuthStatus() {
      const response = await fetch('/api/auth-status', { credentials: 'include', cache: 'no-store' });
      if (!response.ok) {
        throw new Error('鉴权状态检查失败');
      }
      const data = await response.json();
      authEnabled = data.authEnabled;
      isAuthenticated = !!data.authenticated;
      logoutBtnEl.style.display = authEnabled && isAuthenticated ? 'inline-flex' : 'none';
      loginBtnHeaderEl.style.display = authEnabled && !isAuthenticated ? 'inline-flex' : 'none';
      if (authEnabled && !isAuthenticated) {
        showLoginOverlay();
      } else {
        authOverlayEl.style.display = 'none';
      }
      return true;
    }

    function showLoginOverlay() {
      if (!authEnabled) return;
      authErrorEl.textContent = '';
      authOverlayEl.style.display = 'flex';
      usernameInputEl.focus();
    }

    async function submitLogin(event) {
      event.preventDefault();
      authErrorEl.textContent = '';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            username: usernameInputEl.value.trim(),
            password: passwordInputEl.value
          })
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({ error: '登录失败' }));
          throw new Error(data.error || '登录失败');
        }

        usernameInputEl.value = '';
        passwordInputEl.value = '';
        authOverlayEl.style.display = 'none';
        logoutBtnEl.style.display = 'inline-flex';
        loginBtnHeaderEl.style.display = 'none';
        isAuthenticated = true;
        await loadAgents();
        await loadHistory();
      } catch (error) {
        authErrorEl.textContent = error.message;
      }
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST', credentials: 'include' });
      await checkAuthStatus();
      if (authEnabled && !isAuthenticated) {
        history = [];
        chatSessions = [];
        activeSessionId = null;
        renderSessionList();
        renderMessages();
        return;
      }
      await loadHistory();
    }

    function renderSessionList() {
      const optionsHtml = chatSessions.map(session => `
        <option value="${session.id}" ${session.id === activeSessionId ? 'selected' : ''}>
          ${escapeHtml(session.name)} (${session.messageCount})
        </option>
      `).join('');

      sessionSelectEl.innerHTML = optionsHtml;
      sessionSelectMobileEl.innerHTML = optionsHtml;
    }

    function openSessionManager() {
      sessionSheetBackdropEl.style.display = 'flex';
      document.body.classList.add('sheet-open');
    }

    function closeSessionManager(event) {
      if (event && event.target !== sessionSheetBackdropEl) return;
      sessionSheetBackdropEl.style.display = 'none';
      document.body.classList.remove('sheet-open');
    }

    async function switchSession(sessionId) {
      if (!sessionId || sessionId === activeSessionId || isLoading) return;
      try {
        const response = await fetch('/api/sessions/select', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ sessionId })
        });
        if (!response.ok) {
          alert('切换会话失败');
          renderSessionList();
          return;
        }
        await loadHistory();
        closeSessionManager();
      } catch (error) {
        console.error('切换会话失败:', error);
        alert('切换会话失败');
        renderSessionList();
      }
    }

    async function createSession() {
      const name = prompt('请输入新会话名称（可选）') || '';
      const response = await fetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ name })
      });
      if (!response.ok) {
        alert('创建会话失败');
        return;
      }
      await loadHistory();
    }

    async function renameSession() {
      if (!activeSessionId) return;
      const current = chatSessions.find(item => item.id === activeSessionId);
      const name = prompt('请输入新的会话名称', current ? current.name : '');
      if (name === null) return;

      const response = await fetch('/api/sessions/rename', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ sessionId: activeSessionId, name })
      });
      if (!response.ok) {
        alert('重命名失败');
        return;
      }

      const data = await response.json();
      chatSessions = data.chatSessions || chatSessions;
      renderSessionList();
    }

    async function deleteSession() {
      if (!activeSessionId) return;
      if (!confirm('确定删除当前会话吗？该会话中的消息将丢失。')) return;

      const response = await fetch('/api/sessions/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ sessionId: activeSessionId })
      });

      const data = await response.json();
      if (!response.ok) {
        alert(data.error || '删除失败');
        return;
      }

      history = data.messages || [];
      currentAgent = data.currentAgent || null;
      activeSessionId = data.activeSessionId || null;
      chatSessions = data.chatSessions || [];
      renderSessionList();
      updateCurrentAgentUI();
      renderMessages();
      closeSessionManager();
    }

    function isStandaloneMode() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    }

    function setupPwaBanner() {
      if (localStorage.getItem('pwa-banner-dismissed') === '1' || isStandaloneMode()) return;

      pwaBannerEl.style.display = 'flex';
      if (isIOS()) {
        pwaBannerTextEl.textContent = 'iOS 安装提示：点击浏览器分享按钮，再选择“添加到主屏幕”。';
      }
    }

    function dismissPwaBanner() {
      localStorage.setItem('pwa-banner-dismissed', '1');
      pwaBannerEl.style.display = 'none';
    }

    // ============================================
    // 智能体管理
    // ============================================

    async function loadAgents() {
      try {
        const response = await fetch('/api/agents', { credentials: 'include', cache: 'no-store' });
        if (response.ok) {
          const data = await response.json();
          agents = data.agents || [];
          renderAgentsList();
        }
      } catch (error) {
        console.error('加载智能体失败:', error);
      }
    }

    function renderAgentsList() {
      agentsListEl.innerHTML = agents.map(agent => `
        <span class="agent-tag" style="--agent-color: ${agent.color}" title="@${agent.name}" onclick="selectAgent('${agent.name}')">
          ${agent.avatar} ${agent.name}
        </span>
      `).join('');
    }

    function selectAgent(name) {
      const agent = agents.find(a => a.name === name);
      if (agent) {
        userInputEl.value = `@${name} ` + userInputEl.value;
        userInputEl.focus();
      }
    }

    function getMentionCandidates() {
      const list = agents.map(agent => ({
        type: 'agent',
        name: agent.name,
        avatar: agent.avatar,
        color: agent.color
      }));

      list.unshift({
        type: 'all',
        name: '所有人',
        alias: 'all',
        avatar: '📣',
        color: '#ec4899'
      });

      return list;
    }

    function hideMentionSuggestions() {
      mentionState.visible = false;
      mentionSuggestionsEl.style.display = 'none';
      mentionSuggestionsEl.innerHTML = '';
    }

    function renderMentionSuggestions() {
      if (!mentionState.visible || mentionState.items.length === 0) {
        hideMentionSuggestions();
        return;
      }

      mentionSuggestionsEl.style.display = 'block';
      mentionSuggestionsEl.innerHTML = mentionState.items.map((item, index) => {
        const selectedClass = index === mentionState.selectedIndex ? 'mention-suggestion--active' : '';
        const secondary = item.type === 'all' ? '<span class="mention-suggestion__desc">@all</span>' : '<span class="mention-suggestion__desc">智能体</span>';

        return `
          <button
            type="button"
            class="mention-suggestion ${selectedClass}"
            data-index="${index}"
            onclick="selectMentionSuggestion(${index})"
          >
            <span class="mention-suggestion__main">
              <span class="mention-suggestion__avatar">${item.avatar}</span>
              <span class="mention-suggestion__name" style="color: ${item.color};">@${escapeHtml(item.name)}</span>
            </span>
            ${secondary}
          </button>
        `;
      }).join('');
    }

    function updateMentionSuggestions() {
      const value = userInputEl.value;
      const cursor = userInputEl.selectionStart ?? value.length;
      const beforeCursor = value.slice(0, cursor);
      const atIndex = beforeCursor.lastIndexOf('@');

      if (atIndex < 0) {
        hideMentionSuggestions();
        return;
      }

      const prefix = beforeCursor.slice(atIndex + 1);
      if (/\s/.test(prefix) || prefix.includes('@')) {
        hideMentionSuggestions();
        return;
      }

      const normalizedPrefix = prefix.toLowerCase();
      const allCandidates = getMentionCandidates();
      const filtered = allCandidates.filter(item => {
        const names = [item.name, item.alias || ''];
        return names.some(name => name.toLowerCase().startsWith(normalizedPrefix));
      });

      if (filtered.length === 0) {
        hideMentionSuggestions();
        return;
      }

      mentionState.visible = true;
      mentionState.items = filtered;
      mentionState.selectedIndex = 0;
      mentionState.tokenStart = atIndex;
      renderMentionSuggestions();
    }

    function applyMentionSuggestion(index) {
      const item = mentionState.items[index];
      if (!item) return;

      const value = userInputEl.value;
      const cursor = userInputEl.selectionStart ?? value.length;
      const before = value.slice(0, mentionState.tokenStart);
      const after = value.slice(cursor);
      const mentionText = `@${item.name} `;

      userInputEl.value = `${before}${mentionText}${after}`;
      const nextCursor = (before + mentionText).length;
      userInputEl.setSelectionRange(nextCursor, nextCursor);
      hideMentionSuggestions();
      userInputEl.focus();
    }

    function selectMentionSuggestion(index) {
      applyMentionSuggestion(index);
    }

    function switchAgent() {
      currentAgent = null;
      updateCurrentAgentUI();
      userInputEl.placeholder = '输入消息... 使用 @智能体名 召唤 AI';
    }

    function renderWorkdirSelect() {
      if (!chatWorkdirSelectEl) return;
      const currentValue = currentAgent ? (agentWorkdirs[currentAgent] || '') : '';
      const options = [''].concat(workdirOptions || []);
      chatWorkdirSelectEl.innerHTML = options.map(item => {
        const label = item || '默认目录';
        const selected = item === currentValue ? 'selected' : '';
        return `<option value="${escapeHtml(item)}" ${selected}>${escapeHtml(label)}</option>`;
      }).join('');
    }

    async function loadWorkdirOptions() {
      try {
        const response = await fetch('/api/workdirs/options', { credentials: 'include', cache: 'no-store' });
        if (!response.ok) return;
        const data = await response.json();
        workdirOptions = Array.isArray(data.options) ? data.options : [];
        renderWorkdirSelect();
      } catch (error) {
        console.error('加载工作目录选项失败:', error);
      }
    }

    async function applyAgentWorkdir() {
      if (!currentAgent) return;
      const workdir = chatWorkdirSelectEl.value || '';
      try {
        const response = await fetch('/api/workdirs/select', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agentName: currentAgent, workdir })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || '设置失败');
        if (workdir) {
          agentWorkdirs[currentAgent] = workdir;
        } else {
          delete agentWorkdirs[currentAgent];
        }
      } catch (error) {
        alert('设置工作目录失败: ' + error.message);
      }
    }

    function updateCurrentAgentUI() {
      if (currentAgent) {
        const agent = agents.find(a => a.name === currentAgent);
        currentAgentBarEl.style.display = 'flex';
        workdirBarEl.style.display = 'flex';
        currentAgentNameEl.textContent = `${agent ? agent.avatar : '🤖'} ${currentAgent}`;
        currentAgentNameEl.style.color = agent ? agent.color : 'var(--accent)';
        userInputEl.placeholder = `发送消息给 ${currentAgent}...`;
        renderWorkdirSelect();
      } else {
        currentAgentBarEl.style.display = 'none';
        workdirBarEl.style.display = 'none';
        userInputEl.placeholder = '输入消息... 使用 @智能体名 召唤 AI';
      }
    }

    // ============================================
    // 渲染函数
    // ============================================

    function getAgentInfo(name) {
      return agents.find(a => a.name === name);
    }

    function getSenderColor(sender, role) {
      if (role === 'user') return null;
      const agent = getAgentInfo(sender);
      return agent ? agent.color : null;
    }

    function getSenderAvatar(sender, role) {
      if (role === 'user') return '👤';
      const agent = getAgentInfo(sender);
      return agent ? agent.avatar : '🤖';
    }

    function renderCard(block) {
      const toneClass = `card--${block.tone || 'info'}`;
      const icon = {
        info: 'ℹ️',
        success: '✅',
        warning: '⚠️'
      }[block.tone] || 'ℹ️';

      return `
        <div class="card ${toneClass}">
          <div class="card__icon">${icon}</div>
          <div class="card__content">
            <div class="card__title">${escapeHtml(block.title)}</div>
            <div class="card__body">${escapeHtml(block.body)}</div>
          </div>
        </div>
      `;
    }

    function renderChecklist(block) {
      const items = block.items || [];
      const doneCount = items.filter(item => item.done).length;

      return `
        <div class="checklist">
          <div class="checklist__header">
            <span class="checklist__title">${escapeHtml(block.title)}</span>
            <span class="checklist__count">${doneCount}/${items.length}</span>
          </div>
          <ul class="checklist__items">
            ${items.map(item => `
              <li class="checklist__item ${item.done ? 'checklist__item--done' : ''}">
                <span class="checklist__checkbox">${item.done ? '✓' : ''}</span>
                <span class="checklist__text">${escapeHtml(item.text)}</span>
              </li>
            `).join('')}
          </ul>
        </div>
      `;
    }

    function renderBlocks(blocks) {
      if (!blocks || blocks.length === 0) return '';

      return blocks.map(block => {
        switch (block.kind) {
          case 'card':
            return renderCard(block);
          case 'checklist':
            return renderChecklist(block);
          default:
            return `<div class="unknown-block">[未知块: ${block.kind}]</div>`;
        }
      }).join('');
    }

    function highlightMentions(text) {
      return text.replace(/@(\w+)/g, '<span class="mention">@$1</span>');
    }

    function renderMessage(msg) {
      const isUser = msg.role === 'user';
      const roleClass = isUser ? 'message--user' : 'message--assistant';
      const senderColor = getSenderColor(msg.sender, msg.role);
      const avatar = getSenderAvatar(msg.sender, msg.role);

      const colorStyle = senderColor ? `style="--sender-color: ${senderColor}"` : '';

      let content = '';

      if (isUser) {
        content = `<div class="message__text">${highlightMentions(renderPlainText(msg.text || ''))}</div>`;
      } else {
        content = `
          <div class="message__sender" ${colorStyle}>${escapeHtml(msg.sender || 'AI')}</div>
          <div class="message__text message__text--markdown">${renderMarkdown(msg.text || '')}</div>
          <div class="message__blocks">${renderBlocks(msg.blocks)}</div>
        `;
      }

      return `
        <div class="message ${roleClass}" ${colorStyle}>
          <div class="message__avatar">${avatar}</div>
          <div class="message__content">${content}</div>
        </div>
      `;
    }

    function renderLoading(agentName) {
      const agent = getAgentInfo(agentName);
      const avatar = agent ? agent.avatar : '🤖';
      const color = agent ? agent.color : 'var(--accent)';

      return `
        <div class="message message--assistant message--loading" style="--sender-color: ${color}">
          <div class="message__avatar">${avatar}</div>
          <div class="message__content">
            <div class="message__sender" style="--sender-color: ${color}">${agentName}</div>
            <div class="message__text">
              <span class="loading-dots">
                <span></span><span></span><span></span>
              </span>
            </div>
          </div>
        </div>
      `;
    }

    function renderMessages() {
      messagesEl.innerHTML = '';
      history.forEach(msg => {
        messagesEl.innerHTML += renderMessage(msg);
      });
      scrollToBottom();
    }

    function addMessage(msg) {
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();

      messagesEl.innerHTML += renderMessage(msg);
      scrollToBottom();
    }

    function setLoading(loading, agentName = null) {
      isLoading = loading;

      if (loading) {
        sendBtnEl.disabled = true;
        sendBtnEl.textContent = '...';
        messagesEl.innerHTML += renderLoading(agentName || 'AI');
        scrollToBottom();
      } else {
        sendBtnEl.disabled = false;
        sendBtnEl.textContent = '发送';
        const loadingEl = messagesEl.querySelector('.message--loading');
        if (loadingEl) loadingEl.remove();
      }
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderPlainText(text) {
      return escapeHtml(text).replace(/\n/g, '<br>');
    }

    function renderMarkdown(text) {
      const escaped = escapeHtml((text || '').replace(/\r\n/g, '\n'));
      const lines = escaped.split('\n');
      const html = [];
      let inList = false;

      function formatInline(line) {
        const codePlaceholders = [];
        let formatted = line.replace(/`([^`]+)`/g, (_, code) => {
          const idx = codePlaceholders.push(`<code>${code}</code>`) - 1;
          return `@@CODE_${idx}@@`;
        });

        formatted = formatted
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

        return formatted.replace(/@@CODE_(\d+)@@/g, (_, idx) => codePlaceholders[Number(idx)]);
      }

      for (const line of lines) {
        if (line.trim() === '') {
          if (inList) {
            html.push('</ul>');
            inList = false;
          }
          continue;
        }

        const headingMatch = line.match(/^(#{1,3})\s+(.+)$/);
        if (headingMatch) {
          if (inList) {
            html.push('</ul>');
            inList = false;
          }
          const level = headingMatch[1].length;
          html.push(`<h${level}>${formatInline(headingMatch[2])}</h${level}>`);
          continue;
        }

        const listMatch = line.match(/^[-*]\s+(.+)$/);
        if (listMatch) {
          if (!inList) {
            html.push('<ul>');
            inList = true;
          }
          html.push(`<li>${formatInline(listMatch[1])}</li>`);
          continue;
        }

        if (inList) {
          html.push('</ul>');
          inList = false;
        }
        html.push(`<p>${formatInline(line)}</p>`);
      }

      if (inList) {
        html.push('</ul>');
      }

      return html.join('');
    }

    // ============================================
    // API 调用
    // ============================================

    async function recoverViaDirectChat(text) {
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ message: text })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        if (Array.isArray(data.aiMessages)) {
          for (const aiMsg of data.aiMessages) {
            history.push(aiMsg);
            addMessage(aiMsg);
          }
        }
        if (data.currentAgent) {
          currentAgent = data.currentAgent;
          updateCurrentAgentUI();
        }
        statusEl.textContent = '已连接（已自动降级到普通模式）';
        return true;
      } catch (fallbackError) {
        console.error('降级到 /api/chat 失败:', fallbackError);
        return false;
      }
    }

    async function sendMessage(event) {
      event.preventDefault();

      if (authEnabled && !isAuthenticated) {
        showLoginOverlay();
        return;
      }

      if (isLoading) return;

      const text = userInputEl.value.trim();
      if (!text) return;

      userInputEl.value = '';

      const userMsg = { role: 'user', sender: '用户', text: text };
      addMessage(userMsg);
      history.push(userMsg);

      isLoading = true;
      sendBtnEl.disabled = true;
      sendBtnEl.textContent = '...';
      statusEl.textContent = '发送中...';

      const thinkingAgents = new Set();

      try {
        const response = await fetch('/api/chat-stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ message: text })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          let eventType = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) {
              eventType = line.substring(7).trim();
            } else if (line.startsWith('data: ')) {
              const dataStr = line.substring(6);
              try {
                const data = JSON.parse(dataStr);

                if (eventType === 'user_message') {
                  statusEl.textContent = '处理中...';
                } else if (eventType === 'agent_thinking') {
                  const agentName = data.agent;
                  thinkingAgents.add(agentName);
                  statusEl.textContent = `${agentName} 思考中...`;
                  showThinkingIndicator(agentName);
                } else if (eventType === 'agent_message') {
                  thinkingAgents.delete(data.sender);
                  hideThinkingIndicator(data.sender);
                  history.push(data);
                  addMessage(data);
                  statusEl.textContent = thinkingAgents.size > 0
                    ? `${Array.from(thinkingAgents).join(', ')} 思考中...`
                    : '已连接';
                } else if (eventType === 'done') {
                  if (data.currentAgent) {
                    currentAgent = data.currentAgent;
                    updateCurrentAgentUI();
                  }
                } else if (eventType === 'error') {
                  addMessage({
                    role: 'assistant',
                    sender: '系统',
                    text: `❌ 错误: ${data.error}`
                  });
                }
              } catch (e) {
                console.error('解析 SSE 数据失败:', e);
              }
              eventType = '';
            }
          }
        }

      } catch (error) {
        console.error('发送失败:', error);
        statusEl.textContent = '流式连接失败，尝试降级...';
        const recovered = await recoverViaDirectChat(text);
        if (!recovered) {
          statusEl.textContent = '连接失败';
          addMessage({
            role: 'assistant',
            sender: '系统',
            text: `❌ 发送失败: ${error.message}`
          });
        }
      } finally {
        isLoading = false;
        sendBtnEl.disabled = false;
        sendBtnEl.textContent = '发送';
        document.querySelectorAll('.message--thinking').forEach(el => el.remove());
      }
    }

    function showThinkingIndicator(agentName) {
      const agent = agents.find(a => a.name === agentName);
      const avatar = agent ? agent.avatar : '🤖';
      const color = agent ? agent.color : 'var(--accent)';

      const thinkingHtml = `
        <div class="message message--assistant message--thinking" data-agent="${agentName}" style="--sender-color: ${color}">
          <div class="message__avatar">${avatar}</div>
          <div class="message__content">
            <div class="message__sender" style="--sender-color: ${color}">${agentName}</div>
            <div class="message__text">
              <span class="loading-dots">
                <span></span><span></span><span></span>
              </span>
            </div>
          </div>
        </div>
      `;
      messagesEl.insertAdjacentHTML('beforeend', thinkingHtml);
      scrollToBottom();
    }

    function hideThinkingIndicator(agentName) {
      const thinkingEl = messagesEl.querySelector(`.message--thinking[data-agent="${agentName}"]`);
      if (thinkingEl) thinkingEl.remove();
    }

    async function loadHistory() {
      try {
        const response = await fetch('/api/history', { credentials: 'include', cache: 'no-store' });
        if (response.ok) {
          const data = await response.json();
          history = data.messages || [];
          if (data.agents) {
            agents = data.agents;
            renderAgentsList();
          }
          if (data.currentAgent) {
            currentAgent = data.currentAgent;
            updateCurrentAgentUI();
          } else {
            currentAgent = null;
            updateCurrentAgentUI();
          }
          agentWorkdirs = data.agentWorkdirs || {};
          chatSessions = data.chatSessions || [];
          activeSessionId = data.activeSessionId || null;
          renderSessionList();
          renderMessages();
        }
      } catch (error) {
        console.error('加载历史失败:', error);
      }
    }

    async function clearHistory() {
      if (!confirm('确定要清空所有聊天记录吗?')) return;

      try {
        const response = await fetch('/api/clear', { method: 'POST', credentials: 'include' });
        const data = await response.json();
        history = [];
        currentAgent = data.currentAgent;
        updateCurrentAgentUI();
        messagesEl.innerHTML = `
          <div class="welcome">
            <div class="welcome-icon">💬</div>
            <h2>欢迎使用 Bot Room</h2>
            <p>使用 <em>@智能体名</em> 开始对话</p>
            <div class="welcome-agents">
              <span class="welcome-agent" onclick="selectAgent('Claude')">🤖 Claude</span>
              <span class="welcome-agent" onclick="selectAgent('Codex架构师')">🏗️ Codex架构师</span>
              <span class="welcome-agent" onclick="selectAgent('Alice')">👩‍💻 Alice</span>
              <span class="welcome-agent" onclick="selectAgent('Bob')">🧑‍💻 Bob</span>
            </div>
            <p class="hint secondary">@ 一次后，后续消息会自动发送给该智能体</p>
          </div>
        `;
      } catch (error) {
        console.error('清空失败:', error);
        alert('清空失败: ' + error.message);
      }
    }

    window.selectAgent = selectAgent;
    window.submitLogin = submitLogin;
    window.createSession = createSession;
    window.renameSession = renameSession;
    window.deleteSession = deleteSession;
    window.openSessionManager = openSessionManager;
    window.closeSessionManager = closeSessionManager;
    window.showLoginOverlay = showLoginOverlay;
    window.logout = logout;
    window.clearHistory = clearHistory;
    window.sendMessage = sendMessage;
    window.switchAgent = switchAgent;
    window.applyAgentWorkdir = applyAgentWorkdir;
    window.dismissPwaBanner = dismissPwaBanner;

    function bindDomEvents() {
      pwaInstallBtnEl.addEventListener('click', async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        pwaInstallBtnEl.style.display = 'none';
      });

      userInputEl.addEventListener('input', () => {
        updateMentionSuggestions();
      });

      userInputEl.addEventListener('blur', () => {
        setTimeout(() => hideMentionSuggestions(), 120);
      });

      userInputEl.addEventListener('keydown', (e) => {
        if (mentionState.visible && mentionState.items.length > 0) {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            mentionState.selectedIndex = (mentionState.selectedIndex + 1) % mentionState.items.length;
            renderMentionSuggestions();
            return;
          }

          if (e.key === 'ArrowUp') {
            e.preventDefault();
            mentionState.selectedIndex = (mentionState.selectedIndex - 1 + mentionState.items.length) % mentionState.items.length;
            renderMentionSuggestions();
            return;
          }

          if (e.key === 'Enter' || e.key === 'Tab') {
            e.preventDefault();
            applyMentionSuggestion(mentionState.selectedIndex);
            return;
          }

          if (e.key === 'Escape') {
            e.preventDefault();
            hideMentionSuggestions();
            return;
          }
        }

        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage(e);
        }
      });

      sessionSelectEl.addEventListener('change', (e) => {
        switchSession(e.target.value);
      });

      sessionSelectMobileEl.addEventListener('change', (e) => {
        switchSession(e.target.value);
      });
    }

    // ============================================
    // 初始化
    // ============================================

    window.addEventListener('load', async () => {
      cacheDomElements();
      bindDomEvents();

      await checkAuthStatus().catch(() => {});
      if (!authEnabled || isAuthenticated) {
        await loadAgents();
        await loadHistory();
        await loadWorkdirOptions();
      }
      userInputEl.focus();

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js').catch((err) => {
          console.warn('Service Worker 注册失败', err);
        });
      }

      setupPwaBanner();
      if (deferredInstallPrompt) {
        showPwaInstallButton();
      }

      if (isStandaloneMode()) {
        document.body.classList.add('is-standalone');
      }
    });

    function showPwaInstallButton() {
      if (!pwaInstallBtnEl) return;
      pwaInstallBtnEl.style.display = 'inline-flex';
    }

    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      showPwaInstallButton();
      setupPwaBanner();
    });

  </script>
</body>
