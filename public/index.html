<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="agent-co">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>agent-co - 多 AI 智能体聊天室</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/chat-markdown.js"></script>
  <script src="/chat-composer.js"></script>

  <script type="text/babel">
    const welcomeAgents = [
      { name: 'Claude', icon: '🤖' },
      { name: 'Codex架构师', icon: '🏗️' },
      { name: 'Alice', icon: '👩‍💻' },
      { name: 'Bob', icon: '🧑‍💻' }
    ];

    const Icon = ({ name }) => {
      const icons = {
        sessions: (
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 6.5h14M5 12h14M5 17.5h9" />
          </svg>
        ),
        agents: (
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 4.5v4m-5 9v-2a5 5 0 0 1 10 0v2M9 12a3 3 0 1 0 6 0a3 3 0 0 0-6 0Z" />
          </svg>
        ),
        workdir: (
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3.5 8.5h17v9a2 2 0 0 1-2 2h-13a2 2 0 0 1-2-2Zm0 0l3-3h4l2 2h8" />
          </svg>
        ),
        controls: (
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 7h12M6 12h12M6 17h12M9 7v2m6 3v2m-3 3v2" />
          </svg>
        ),
        focus: (
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 4.5H5.5V7M16 4.5h2.5V7M8 19.5H5.5V17M16 19.5h2.5V17M8.5 12a3.5 3.5 0 1 0 7 0a3.5 3.5 0 0 0-7 0Z" />
          </svg>
        )
      };

      return <span className="icon" data-icon={name}>{icons[name] || icons.sessions}</span>;
    };

    const WelcomeBlock = () => (
      <div className="welcome">
        <div className="welcome-orb">
          <div className="welcome-icon">💬</div>
        </div>
        <h2>欢迎使用 agent-co</h2>
        <p>把聊天内容放在中心，把控制信息收回侧边。点击下方智能体或使用 <em>@智能体名</em> 开始对话。</p>
        <div className="welcome-agents">
          {welcomeAgents.map((agent) => (
            <span
              key={agent.name}
              className="welcome-agent"
              onClick={() => window.selectAgent && window.selectAgent(agent.name)}
            >
              {agent.icon} {agent.name}
            </span>
          ))}
        </div>
        <p className="hint secondary">@ 一次后，后续消息会自动发送给该智能体</p>
      </div>
    );

    const ChatScrollIntro = () => (
      <div className="messages-intro">
        <div className="pwa-banner" id="pwaBanner" style={{ display: 'none' }}>
          <span id="pwaBannerText">安装 agent-co 到主屏幕，获得更好的 iOS 全屏体验。</span>
          <div className="pwa-banner__actions">
            <button className="btn-clear" id="pwaInstallBtn" style={{ display: 'none' }} onClick={() => window.triggerPwaInstall && window.triggerPwaInstall()}>安装</button>
            <button className="btn-clear" onClick={() => window.dismissPwaBanner && window.dismissPwaBanner()}>关闭</button>
          </div>
        </div>

        <div className="chat-focus-strip">
          <div className="chat-focus-strip__summary">
            <span className="chat-focus-strip__label">聚焦对话</span>
            <span className="chat-focus-strip__value" id="focusAgentSummary"><Icon name="focus" />尚未锁定智能体</span>
          </div>
          <div className="chat-focus-strip__meta">
            <span className="chat-focus-strip__hint">使用 `@智能体名` 或右侧面板切换上下文</span>
            <button className="btn-clear chat-focus-strip__action" onClick={() => window.toggleContextPanel && window.toggleContextPanel('agents')}>管理上下文</button>
          </div>
        </div>
      </div>
    );

    const SessionSettingsCard = ({ variant = 'desktop' }) => {
      const isDesktop = variant === 'desktop';
      const cardClassName = 'session-settings-card';
      const introText = isDesktop
        ? '控制链式 @ 传播的最多传播轮数，以及单个智能体在一次链路中的重复调用上限。'
        : '移动端也可直接调整链式传播与同智能体调用上限。';
      const helperText = isDesktop
        ? '“最多传播轮数”会限制链式扩散的总轮数；关闭“不限制”后，可限制同一智能体在一次链路中的重复出场次数。'
        : '与桌面端保持一致：不限制表示允许同一智能体在一条链路中重复出场。';
      const desktopIds = isDesktop ? {
        card: 'currentSessionSettings',
        badge: 'currentSessionSettingsBadge',
        discussionMode: 'discussionModeSelect',
        hopsInput: 'agentChainMaxHopsInput',
        hopsSave: 'saveAgentChainMaxHopsBtn',
        unlimitedInput: 'agentChainMaxCallsUnlimitedInput',
        callsRow: 'agentChainMaxCallsLimitRow',
        callsInput: 'agentChainMaxCallsPerAgentInput',
        callsSave: 'saveAgentChainMaxCallsPerAgentBtn',
        feedback: 'sessionSettingsFeedback'
      } : {};

      return (
        <div
          className={cardClassName}
          data-session-settings-variant={variant}
          {...(desktopIds.card ? { id: desktopIds.card } : {})}
        >
          <div className="session-settings-card__header">
            <div>
              <div className="sessions-label">当前会话设置</div>
              <p className="context-section__intro">{introText}</p>
            </div>
            <span
              className="session-settings-card__pill"
              data-session-settings-badge
              {...(desktopIds.badge ? { id: desktopIds.badge } : {})}
            >
              未选择会话
            </span>
          </div>
          <label
            className="session-settings-field"
            {...(desktopIds.discussionMode ? { htmlFor: desktopIds.discussionMode } : {})}
          >
            <span className="session-settings-field__label">讨论模式</span>
            <div className="session-settings-field__control">
              <select
                data-session-setting="discussionMode"
                {...(desktopIds.discussionMode ? { id: desktopIds.discussionMode } : {})}
              >
                <option value="classic">经典链式</option>
                <option value="peer">对等讨论</option>
              </select>
            </div>
          </label>
          <label
            className="session-settings-field"
            {...(desktopIds.hopsInput ? { htmlFor: desktopIds.hopsInput } : {})}
          >
            <span className="session-settings-field__label">最多传播轮数</span>
            <div className="session-settings-field__control">
              <input
                data-session-setting="agentChainMaxHops"
                type="number"
                min="1"
                step="1"
                inputMode="numeric"
                placeholder="例如 4"
                {...(desktopIds.hopsInput ? { id: desktopIds.hopsInput } : {})}
              />
              <button
                className="btn-session"
                data-session-setting-save="agentChainMaxHops"
                data-session-setting-action="saveAgentChainMaxHops"
                type="button"
                onClick={() => window.saveAgentChainMaxHops && window.saveAgentChainMaxHops()}
                {...(desktopIds.hopsSave ? { id: desktopIds.hopsSave } : {})}
              >
                保存
              </button>
            </div>
          </label>
          <div className="session-settings-field">
            <span className="session-settings-field__label">单个智能体最多调用次数</span>
            <label
              className="session-settings-toggle"
              {...(desktopIds.unlimitedInput ? { htmlFor: desktopIds.unlimitedInput } : {})}
            >
              <input
                data-session-setting="agentChainMaxCallsUnlimited"
                type="checkbox"
                {...(desktopIds.unlimitedInput ? { id: desktopIds.unlimitedInput } : {})}
              />
              <span>不限制</span>
            </label>
          </div>
          <div
            className="session-settings-field"
            data-session-setting-row="agentChainMaxCallsPerAgent"
            {...(desktopIds.callsRow ? { id: desktopIds.callsRow } : {})}
          >
            <div className="session-settings-field__control">
              <input
                data-session-setting="agentChainMaxCallsPerAgent"
                type="number"
                min="1"
                step="1"
                inputMode="numeric"
                placeholder="例如 2"
                {...(desktopIds.callsInput ? { id: desktopIds.callsInput } : {})}
              />
              <button
                className="btn-session"
                data-session-setting-save="agentChainMaxCallsPerAgent"
                data-session-setting-action="saveAgentChainMaxCallsPerAgent"
                type="button"
                onClick={() => window.saveAgentChainMaxCallsPerAgent && window.saveAgentChainMaxCallsPerAgent()}
                {...(desktopIds.callsSave ? { id: desktopIds.callsSave } : {})}
              >
                保存
              </button>
            </div>
          </div>
          <p className="session-settings-helper">{helperText}</p>
          <div
            className="session-settings-feedback"
            data-session-settings-feedback
            aria-live="polite"
            {...(desktopIds.feedback ? { id: desktopIds.feedback } : {})}
          ></div>
        </div>
      );
    };

    const App = () => (
      <>
        <div className="auth-overlay" id="authOverlay" style={{ display: 'none' }}>
          <div className="auth-card">
            <h2>访问验证</h2>
            <p>请输入凭据以继续访问</p>
            <form onSubmit={(event) => window.submitLogin && window.submitLogin(event)}>
              <input type="text" id="usernameInput" placeholder="用户名" autoComplete="username" required />
              <input type="password" id="passwordInput" placeholder="密码" autoComplete="current-password" required />
              <button type="submit" id="loginBtn">登录</button>
            </form>
            <p className="auth-error" id="authError"></p>
          </div>
        </div>

        <div className="container">
          <aside className="utility-rail">
            <div className="utility-rail__brand">BR</div>
            <button className="utility-rail__btn utility-rail__btn--primary" data-tab="sessions" onClick={() => window.toggleContextPanel && window.toggleContextPanel('sessions')} title="会话"><Icon name="sessions" /></button>
            <button className="utility-rail__btn" data-tab="agents" onClick={() => window.toggleContextPanel && window.toggleContextPanel('agents')} title="智能体"><Icon name="agents" /></button>
            <button className="utility-rail__btn" data-tab="workdir" onClick={() => window.toggleContextPanel && window.toggleContextPanel('workdir')} title="目录"><Icon name="workdir" /></button>
            <div className="utility-rail__spacer"></div>
            <button className="utility-rail__btn utility-rail__btn--mobile" onClick={() => window.openMobileControlHub && window.openMobileControlHub('sessions')} title="控制中心"><Icon name="controls" /></button>
          </aside>

          <div className="main-layout">
            <div className="chat-panel">
              <header className="header">
                <div className="header-main">
                  <div className="header-title">
                    <span className="header-kicker">agent-co</span>
                    <h1>Focused Chat</h1>
                    <p className="header-subtitle">让消息成为主视图，其余上下文按需展开。</p>
                  </div>
                  <div className="header-session-pill header-session-pill--mobile-hidden" id="activeSessionBadge">当前会话</div>
                </div>
                <div className="header-actions">
                  <span className="status" id="status">已连接</span>
                  <button
                    className="btn-clear btn-stop-action stop-current"
                    id="stopCurrentBtn"
                    style={{ display: 'none' }}
                    onClick={() => window.requestChatStop && window.requestChatStop('current')}
                  >
                    停止当前智能体
                  </button>
                  <button
                    className="btn-clear btn-stop-action stop-session"
                    id="stopSessionBtn"
                    style={{ display: 'none' }}
                    onClick={() => window.requestChatStop && window.requestChatStop('session')}
                  >
                    停止本次执行
                  </button>
                  <button className="btn-clear btn-mobile-session" onClick={() => window.openMobileControlHub && window.openMobileControlHub('sessions')}>控制</button>
                  <button className="btn-clear btn-desktop-context" data-tab="sessions" onClick={() => window.toggleContextPanel && window.toggleContextPanel('sessions')}>会话</button>
                  <button className="btn-clear btn-desktop-context" data-tab="agents" onClick={() => window.toggleContextPanel && window.toggleContextPanel('agents')}>智能体</button>
                  <button className="btn-clear btn-desktop-context" data-tab="workdir" onClick={() => window.toggleContextPanel && window.toggleContextPanel('workdir')}>目录</button>
                  <button className="btn-clear btn-header-secondary" id="loginBtnHeader" style={{ display: 'none' }} onClick={() => window.showLoginOverlay && window.showLoginOverlay()}>登录</button>
                  <button className="btn-clear btn-header-secondary" id="logoutBtn" style={{ display: 'none' }} onClick={() => window.logout && window.logout()}>退出</button>
                  <button className="btn-clear btn-header-secondary" onClick={() => window.open('/verbose-logs.html', '_blank')}>CLI日志</button>
                  <button className="btn-clear btn-header-secondary" onClick={() => window.open('/deps-monitor.html', '_blank')}>运维日志</button>
                  <button className="btn-clear btn-header-secondary" onClick={() => window.clearHistory && window.clearHistory()}>清空</button>
                </div>
              </header>

              <div className="messages-shell">
                <div className="messages" id="messages">
                  <ChatScrollIntro />
                  <WelcomeBlock />
                </div>
              </div>

              <div className="mobile-composer-drawer-backdrop" id="mobileComposerDrawerBackdrop" style={{ display: 'none' }} onClick={(event) => window.closeMobileComposerDrawer && window.closeMobileComposerDrawer(event)}></div>

              <div className="input-area mobile-composer-drawer" id="mobileComposerDrawer">
                <div className="mobile-composer-drawer__chrome">
                  <div className="mobile-composer-drawer__handle"></div>
                  <div className="mobile-composer-drawer__header">
                    <div>
                      <div className="mobile-composer-drawer__title">编辑消息</div>
                      <div className="mobile-composer-drawer__subtitle">聊天区保持常驻，输入区以抽屉方式展开。</div>
                    </div>
                    <button className="btn-clear" type="button" onClick={() => window.closeMobileComposerDrawer && window.closeMobileComposerDrawer()}>关闭</button>
                  </div>
                </div>
                <form onSubmit={(event) => window.sendMessage && window.sendMessage(event)}>
                  <div className="composer-toolbar">
                    <button type="button" className="composer-toolbar__btn" data-md-action="bold">粗体</button>
                    <button type="button" className="composer-toolbar__btn" data-md-action="italic">斜体</button>
                    <button type="button" className="composer-toolbar__btn" data-md-action="inline-code">代码</button>
                    <button type="button" className="composer-toolbar__btn" data-md-action="code-block">代码块</button>
                    <button type="button" className="composer-toolbar__btn" data-md-action="link">链接</button>
                    <button type="button" className="composer-toolbar__btn" data-md-action="list">列表</button>
                    <button type="button" className="composer-toolbar__btn" data-md-action="ordered-list">有序</button>
                    <button type="button" className="composer-toolbar__btn" data-md-action="blockquote">引用</button>
                  </div>
                  <div className="composer-mobile-tabs">
                    <button type="button" className="composer-mobile-tabs__tab is-active" data-tab="edit">编辑</button>
                    <button type="button" className="composer-mobile-tabs__tab" data-tab="preview">预览</button>
                  </div>
                  <div className="composer-body">
                    <div className="composer-editor" data-composer-panel="edit">
                      <div className="mention-input-wrap">
                        <div className="group-mention-preview" id="groupMentionPreview" style={{ display: 'none' }}></div>
                        <textarea
                          id="userInput"
                          placeholder="输入消息... 使用 @智能体名 召唤 AI"
                          autoComplete="off"
                          autoFocus
                          rows="1"
                        ></textarea>
                        <div className="mention-suggestions" id="mentionSuggestions" style={{ display: 'none' }}></div>
                      </div>
                    </div>
                    <div className="composer-preview" id="composerPreview" data-composer-panel="preview">
                      <div className="composer-preview__header">
                        <div>
                          <div className="composer-preview__title">预览</div>
                          <div className="composer-preview__subtitle">支持 Markdown 语法，Enter 发送，Shift+Enter 换行</div>
                        </div>
                        <div className="composer-preview__meta" id="composerPreviewStatus">0 行 · 0 字符</div>
                      </div>
                      <div className="composer-preview__body" id="composerPreviewBody">
                        <div className="composer-preview__empty">Markdown 预览会显示在这里</div>
                      </div>
                    </div>
                  </div>
                  <div className="composer-actions">
                    <button type="submit" id="sendBtn">发送</button>
                  </div>
                </form>
                <div className="input-area__hint">聊天区保持专注显示，会话、智能体与目录设置可从侧边栏或控制中心展开。</div>
              </div>

              <button className="mobile-composer-trigger" type="button" onClick={() => window.openMobileComposerDrawer && window.openMobileComposerDrawer()}>
                写消息
              </button>
              <button className="mobile-composer-triggerbar" type="button" onClick={() => window.openMobileComposerDrawer && window.openMobileComposerDrawer()}>
                <span>写消息</span>
                <span className="mobile-composer-triggerbar__hint">Markdown / @智能体</span>
              </button>
            </div>

            <aside className="context-panel" id="contextPanel" data-tab="sessions">
              <div className="context-panel__header">
                <div>
                  <div className="context-panel__eyebrow">Context</div>
                  <h2>控制中心</h2>
                </div>
                <button className="btn-clear" onClick={() => window.closeContextPanel && window.closeContextPanel()}>关闭</button>
              </div>

              <div className="context-panel__tabs">
                <button className="context-tab is-active" data-tab="sessions" onClick={() => window.setContextTab && window.setContextTab('sessions')}>会话</button>
                <button className="context-tab" data-tab="agents" onClick={() => window.setContextTab && window.setContextTab('agents')}>智能体</button>
                <button className="context-tab" data-tab="workdir" onClick={() => window.setContextTab && window.setContextTab('workdir')}>目录</button>
              </div>

              <section className="context-section" data-section="sessions">
                <div className="sessions-label">会话蓝图</div>
                <p className="context-section__intro">快速切换会话，或者创建新的工作流分支。</p>
                <input id="sessionSearchInput" type="text" placeholder="搜索会话名称" autoComplete="off" />
                <div className="recent-sessions" id="recentSessions"></div>
                <select id="sessionSelect" size="12"></select>
                <div className="session-actions">
                  <button className="btn-session" onClick={() => window.createSession && window.createSession()}>新建会话</button>
                  <button className="btn-session" onClick={() => window.renameSession && window.renameSession()}>重命名</button>
                  <button className="btn-session btn-session--danger" onClick={() => window.deleteSession && window.deleteSession()}>删除会话</button>
                </div>
                <SessionSettingsCard variant="desktop" />
              </section>

              <section className="context-section" data-section="workdir">
                <p className="context-section__intro">为当前对话智能体指定运行目录，保留上下文但不占据主聊天区。</p>
                <div className="current-agent-bar current-agent-bar--workdir" id="workdirBar" style={{ display: 'none' }}>
                  <span className="current-agent-label">工作目录</span>
                  <select id="agentWorkdirRoot"></select>
                  <select id="agentWorkdirLevel2"></select>
                  <select id="agentWorkdirLevel3"></select>
                  <input id="chatWorkdirPreview" type="text" readOnly placeholder="默认进程目录" />
                  <button className="btn-switch" onClick={() => window.applyAgentWorkdir && window.applyAgentWorkdir()}>应用</button>
                </div>
                <div className="context-workdir-empty" id="contextWorkdirEmpty">选择一个当前对话智能体后，这里会显示目录层级选择。</div>
              </section>

              <section className="context-section" data-section="agents">
                <div className="agents-bar">
                  <span className="agents-label">智能体</span>
                  <p className="context-section__intro">启用本会话可参与对话的智能体，并管理当前聚焦对象。</p>
                  <div className="agents-list" id="agentsList"></div>
                </div>
                <div className="agent-zero-state" id="agentZeroState" style={{ display: 'none' }}>
                  <strong>当前会话还没有启用智能体</strong>
                  <span>新建会话默认全部关闭，请先打开滑块，再发送消息。</span>
                </div>
                <div className="current-agent-bar" id="currentAgentBar" style={{ display: 'none' }}>
                  <span className="current-agent-label">当前对话</span>
                  <span className="current-agent-name" id="currentAgentName"></span>
                  <span className="current-agent-expiry" id="currentAgentExpiryHint" style={{ display: 'none' }}>已停用，将在下一条消息后失效</span>
                  <button className="btn-switch" onClick={() => window.switchAgent && window.switchAgent()}>切换</button>
                </div>
              </section>
            </aside>
          </div>
        </div>

        <div className="mobile-control-sheet-backdrop" id="mobileControlSheetBackdrop" style={{ display: 'none' }} onClick={(event) => window.closeMobileControlHub && window.closeMobileControlHub(event)}>
          <aside className="mobile-control-sheet" role="dialog" aria-label="移动端控制中心" onClick={(event) => event.stopPropagation()}>
            <div className="mobile-control-sheet__handle"></div>
            <div className="session-sheet__header">
              <h2>控制中心</h2>
              <button className="btn-clear" onClick={() => window.closeMobileControlHub && window.closeMobileControlHub()}>完成</button>
            </div>
            <p className="mobile-control-sheet__intro">在不遮挡聊天主舞台的前提下，集中管理会话、智能体和目录。</p>
            <div className="context-panel__tabs context-panel__tabs--mobile">
              <button className="context-tab is-active" data-tab="sessions" onClick={() => window.setContextTab && window.setContextTab('sessions')}>会话</button>
              <button className="context-tab" data-tab="agents" onClick={() => window.setContextTab && window.setContextTab('agents')}>智能体</button>
              <button className="context-tab" data-tab="workdir" onClick={() => window.setContextTab && window.setContextTab('workdir')}>目录</button>
              <button className="context-tab" data-tab="logs" onClick={() => window.setContextTab && window.setContextTab('logs')}>日志</button>
            </div>
            <div className="mobile-control-sheet__body">
              <section className="context-section context-section--mobile" data-section="sessions">
                <select id="sessionSelectMobile" size="8"></select>
                <div className="session-sheet__actions">
                  <button className="btn-session" onClick={() => window.createSession && window.createSession()}>新建会话</button>
                  <button className="btn-session" onClick={() => window.renameSession && window.renameSession()}>重命名</button>
                  <button className="btn-session btn-session--danger" onClick={() => window.deleteSession && window.deleteSession()}>删除会话</button>
                </div>
                <SessionSettingsCard variant="mobile" />
              </section>
              <section className="context-section context-section--mobile" data-section="agents">
                <div className="mobile-agents-mirror" id="mobileAgentsMirror"></div>
              </section>
              <section className="context-section context-section--mobile" data-section="workdir">
                <div className="mobile-workdir-mirror" id="mobileWorkdirMirror"></div>
              </section>
              <section className="context-section context-section--mobile" data-section="logs">
                <div className="mobile-log-links">
                  <button className="btn-session" onClick={() => window.open('/verbose-logs.html', '_blank')}>CLI日志</button>
                  <button className="btn-session" onClick={() => window.open('/deps-monitor.html', '_blank')}>运维日志</button>
                </div>
              </section>
            </div>
          </aside>
        </div>
      </>
    );

    const appRoot = ReactDOM.createRoot(document.getElementById('app'));
    ReactDOM.flushSync(() => {
      appRoot.render(<App />);
    });
  </script>

  <script>
    // ============================================
    // 状态管理
    // ============================================
    let history = [];
    let agents = [];
    let isLoading = false;
    let isStopRequestInFlight = false;
    let currentAgent = null;
    let currentAgentWillExpire = false;
    let chatSessions = [];
    let activeSessionId = null;
    let activeSession = null;
    let agentWorkdirs = {};
    let enabledAgents = new Set();
    let discussionMode = 'classic';
    let discussionState = 'active';
    let agentChainMaxHops = '';
    let agentChainMaxCallsPerAgent = null;
    const chatWorkdirState = { root: '', level2: '', level3: '', custom: '' };
    const streamingAgentTexts = new Map();
    let groups = [];
    let expandedGroups = new Set();
    let activeGroup = null;
    let groupMentionPreview = null;

    // DOM 元素
    let messagesEl;
    let userInputEl;
    let sendBtnEl;
    let statusEl;
    let stopCurrentBtnEl;
    let stopSessionBtnEl;
    let agentsListEl;
    let currentAgentBarEl;
    let currentAgentNameEl;
    let currentAgentExpiryHintEl;
    let workdirBarEl;
    let agentWorkdirRootEl;
    let agentWorkdirLevel2El;
    let agentWorkdirLevel3El;
    let chatWorkdirPreviewEl;
    let authOverlayEl;
    let usernameInputEl;
    let passwordInputEl;
    let authErrorEl;
    let logoutBtnEl;
    let loginBtnHeaderEl;
    let mentionSuggestionsEl;
    let sessionSelectEl;
    let sessionSelectMobileEl;
    let mobileControlSheetBackdropEl;
    let pwaBannerEl;
    let pwaBannerTextEl;
    let pwaInstallBtnEl;
    let agentZeroStateEl;
    let contextPanelEl;
    let activeSessionBadgeEl;
    let focusAgentSummaryEl;
    let contextWorkdirEmptyEl;
    let mobileAgentsMirrorEl;
    let mobileWorkdirMirrorEl;
    let sessionSearchInputEl;
    let recentSessionsEl;
    let currentSessionSettingsBadgeEls = [];
    let discussionModeSelectEls = [];
    let agentChainMaxHopsInputEls = [];
    let saveAgentChainMaxHopsBtnEls = [];
    let agentChainMaxCallsUnlimitedInputEls = [];
    let agentChainMaxCallsPerAgentInputEls = [];
    let saveAgentChainMaxCallsPerAgentBtnEls = [];
    let agentChainMaxCallsLimitRowEls = [];
    let sessionSettingsFeedbackEls = [];
    let groupMentionPreviewEl;

    let activeContextTab = 'sessions';
    let sessionSearchQuery = '';

    function cacheMessageChromeElements() {
      pwaBannerEl = document.getElementById('pwaBanner');
      pwaBannerTextEl = document.getElementById('pwaBannerText');
      pwaInstallBtnEl = document.getElementById('pwaInstallBtn');
      focusAgentSummaryEl = document.getElementById('focusAgentSummary');
      groupMentionPreviewEl = document.getElementById('groupMentionPreview');
    }

    function cacheDomElements() {
      messagesEl = document.getElementById('messages');
      userInputEl = document.getElementById('userInput');
      sendBtnEl = document.getElementById('sendBtn');
      statusEl = document.getElementById('status');
      stopCurrentBtnEl = document.getElementById('stopCurrentBtn');
      stopSessionBtnEl = document.getElementById('stopSessionBtn');
      agentsListEl = document.getElementById('agentsList');
      currentAgentBarEl = document.getElementById('currentAgentBar');
      currentAgentNameEl = document.getElementById('currentAgentName');
      currentAgentExpiryHintEl = document.getElementById('currentAgentExpiryHint');
      workdirBarEl = document.getElementById('workdirBar');
      agentWorkdirRootEl = document.getElementById('agentWorkdirRoot');
      agentWorkdirLevel2El = document.getElementById('agentWorkdirLevel2');
      agentWorkdirLevel3El = document.getElementById('agentWorkdirLevel3');
      chatWorkdirPreviewEl = document.getElementById('chatWorkdirPreview');
      authOverlayEl = document.getElementById('authOverlay');
      usernameInputEl = document.getElementById('usernameInput');
      passwordInputEl = document.getElementById('passwordInput');
      authErrorEl = document.getElementById('authError');
      logoutBtnEl = document.getElementById('logoutBtn');
      loginBtnHeaderEl = document.getElementById('loginBtnHeader');
      mentionSuggestionsEl = document.getElementById('mentionSuggestions');
      sessionSelectEl = document.getElementById('sessionSelect');
      sessionSelectMobileEl = document.getElementById('sessionSelectMobile');
      mobileControlSheetBackdropEl = document.getElementById('mobileControlSheetBackdrop');
      agentZeroStateEl = document.getElementById('agentZeroState');
      contextPanelEl = document.getElementById('contextPanel');
      activeSessionBadgeEl = document.getElementById('activeSessionBadge');
      contextWorkdirEmptyEl = document.getElementById('contextWorkdirEmpty');
      mobileAgentsMirrorEl = document.getElementById('mobileAgentsMirror');
      mobileWorkdirMirrorEl = document.getElementById('mobileWorkdirMirror');
      sessionSearchInputEl = document.getElementById('sessionSearchInput');
      recentSessionsEl = document.getElementById('recentSessions');
      currentSessionSettingsBadgeEls = Array.from(document.querySelectorAll('[data-session-settings-badge]'));
      discussionModeSelectEls = Array.from(document.querySelectorAll('[data-session-setting="discussionMode"]'));
      agentChainMaxHopsInputEls = Array.from(document.querySelectorAll('[data-session-setting="agentChainMaxHops"]'));
      saveAgentChainMaxHopsBtnEls = Array.from(document.querySelectorAll('[data-session-setting-save="agentChainMaxHops"]'));
      agentChainMaxCallsUnlimitedInputEls = Array.from(document.querySelectorAll('[data-session-setting="agentChainMaxCallsUnlimited"]'));
      agentChainMaxCallsPerAgentInputEls = Array.from(document.querySelectorAll('[data-session-setting="agentChainMaxCallsPerAgent"]'));
      saveAgentChainMaxCallsPerAgentBtnEls = Array.from(document.querySelectorAll('[data-session-setting-save="agentChainMaxCallsPerAgent"]'));
      agentChainMaxCallsLimitRowEls = Array.from(document.querySelectorAll('[data-session-setting-row="agentChainMaxCallsPerAgent"]'));
      sessionSettingsFeedbackEls = Array.from(document.querySelectorAll('[data-session-settings-feedback]'));
      cacheMessageChromeElements();
    }

    let deferredInstallPrompt = null;

    let mentionState = {
      visible: false,
      items: [],
      selectedIndex: 0,
      tokenStart: -1
    };

    let authEnabled = false;
    let isAuthenticated = false;

    async function checkAuthStatus() {
      const response = await fetch('/api/auth-status', { credentials: 'include', cache: 'no-store' });
      if (!response.ok) {
        throw new Error('鉴权状态检查失败');
      }
      const data = await response.json();
      authEnabled = data.authEnabled;
      isAuthenticated = !!data.authenticated;
      logoutBtnEl.style.display = authEnabled && isAuthenticated ? 'inline-flex' : 'none';
      loginBtnHeaderEl.style.display = authEnabled && !isAuthenticated ? 'inline-flex' : 'none';
      if (authEnabled && !isAuthenticated) {
        showLoginOverlay();
      } else {
        authOverlayEl.style.display = 'none';
      }
      return true;
    }

    function showLoginOverlay() {
      if (!authEnabled) return;
      authErrorEl.textContent = '';
      authOverlayEl.style.display = 'flex';
      usernameInputEl.focus();
    }

    async function submitLogin(event) {
      event.preventDefault();
      authErrorEl.textContent = '';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            username: usernameInputEl.value.trim(),
            password: passwordInputEl.value
          })
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({ error: '登录失败' }));
          throw new Error(data.error || '登录失败');
        }

        usernameInputEl.value = '';
        passwordInputEl.value = '';
        authOverlayEl.style.display = 'none';
        logoutBtnEl.style.display = 'inline-flex';
        loginBtnHeaderEl.style.display = 'none';
        isAuthenticated = true;
        await loadAgents();
        await loadHistory();
        await loadGroups();
        await loadWorkdirOptions();
      } catch (error) {
        authErrorEl.textContent = error.message;
      }
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST', credentials: 'include' });
      await checkAuthStatus();
      if (authEnabled && !isAuthenticated) {
        history = [];
        chatSessions = [];
        activeSessionId = null;
        activeSession = null;
        discussionMode = 'classic';
        discussionState = 'active';
        agentChainMaxHops = '';
        agentChainMaxCallsPerAgent = null;
        sessionSearchQuery = '';
        if (sessionSearchInputEl) sessionSearchInputEl.value = '';
        enabledAgents = new Set();
        currentAgent = null;
        currentAgentWillExpire = false;
        renderSessionList();
        renderSessionSettings();
        renderAgentsList();
        updateCurrentAgentUI();
        renderMessages();
        return;
      }
      await loadHistory();
      await loadGroups();
    }

    function getVisibleSessions() {
      const normalizedQuery = sessionSearchQuery.trim().toLowerCase();
      if (!normalizedQuery) return chatSessions;
      return chatSessions.filter((session) => {
        return session.name.toLowerCase().includes(normalizedQuery);
      });
    }

    function renderRecentSessions() {
      if (!recentSessionsEl) return;
      const recent = chatSessions.slice(0, 4);
      if (recent.length === 0) {
        recentSessionsEl.innerHTML = '';
        return;
      }

        recentSessionsEl.innerHTML = recent.map((session) => {
        const activeClass = session.id === activeSessionId ? ' is-active' : '';
        return `
          <button
            type="button"
            class="recent-session-chip${activeClass}"
            onclick="window.switchSession && window.switchSession('${session.id}')"
          >
            ${escapeHtml(session.name)}
          </button>
        `;
      }).join('');
    }

    function updateSessionSearch() {
      sessionSearchQuery = sessionSearchInputEl ? sessionSearchInputEl.value : '';
      renderSessionList();
    }

    function setSessionSettingsFeedback(message = '', tone = '') {
      sessionSettingsFeedbackEls.forEach((el) => {
        el.textContent = message;
        el.classList.remove('is-success', 'is-error');
        if (tone === 'success') {
          el.classList.add('is-success');
        } else if (tone === 'error') {
          el.classList.add('is-error');
        }
      });
    }

    function syncSessionSettingsState(session) {
      activeSession = session || null;
      discussionMode = session && session.discussionMode === 'peer' ? 'peer' : 'classic';
      discussionState = session && typeof session.discussionState === 'string' ? session.discussionState : 'active';
      agentChainMaxHops = session && Number.isInteger(session.agentChainMaxHops)
        ? session.agentChainMaxHops
        : '';
      agentChainMaxCallsPerAgent = session && Object.prototype.hasOwnProperty.call(session, 'agentChainMaxCallsPerAgent')
        ? session.agentChainMaxCallsPerAgent
        : null;
      setSessionSettingsFeedback('');
      renderSessionSettings();
    }

    function renderSessionSettings() {
      if (discussionModeSelectEls.length === 0 || agentChainMaxHopsInputEls.length === 0 || agentChainMaxCallsUnlimitedInputEls.length === 0 || agentChainMaxCallsPerAgentInputEls.length === 0 || agentChainMaxCallsLimitRowEls.length === 0) {
        return;
      }

      const hasActiveSession = !!activeSession;
      const isUnlimited = agentChainMaxCallsPerAgent === null;

      discussionModeSelectEls.forEach((el) => {
        el.value = discussionMode;
        el.disabled = !hasActiveSession;
      });
      agentChainMaxHopsInputEls.forEach((el) => {
        el.value = agentChainMaxHops === '' ? '' : String(agentChainMaxHops);
        el.disabled = !hasActiveSession;
      });
      agentChainMaxCallsUnlimitedInputEls.forEach((el) => {
        el.checked = isUnlimited;
        el.disabled = !hasActiveSession;
      });
      agentChainMaxCallsPerAgentInputEls.forEach((el) => {
        el.value = isUnlimited || agentChainMaxCallsPerAgent === null ? '' : String(agentChainMaxCallsPerAgent);
        el.disabled = !hasActiveSession || isUnlimited;
      });
      agentChainMaxCallsLimitRowEls.forEach((el) => {
        el.hidden = isUnlimited;
      });
      saveAgentChainMaxHopsBtnEls.forEach((el) => {
        el.disabled = !hasActiveSession;
      });
      saveAgentChainMaxCallsPerAgentBtnEls.forEach((el) => {
        el.disabled = !hasActiveSession || isUnlimited;
      });

      currentSessionSettingsBadgeEls.forEach((el) => {
        el.textContent = hasActiveSession ? activeSession.name : '未选择会话';
      });

      if (!hasActiveSession) {
        setSessionSettingsFeedback('请选择一个会话后再调整链路限制。');
      }
    }

    function parsePositiveIntegerSetting(rawValue, label) {
      const normalized = String(rawValue || '').trim();
      if (!normalized) {
        throw new Error(`${label} 不能为空`);
      }

      const parsed = Number(normalized);
      if (!Number.isInteger(parsed) || parsed < 1) {
        throw new Error(`${label} 必须是正整数`);
      }

      return parsed;
    }

    function applySessionResponseData(data, options = {}) {
      const {
        replaceMessages = false,
        replaceCurrentAgent = false,
        replaceEnabledAgents = false,
        replaceAgentWorkdirs = false
      } = options;

      if (replaceMessages) {
        history = data.messages || (data.session && data.session.history) || [];
      }
      if (replaceCurrentAgent) {
        currentAgent = Object.prototype.hasOwnProperty.call(data, 'currentAgent')
          ? data.currentAgent
          : (data.session ? data.session.currentAgent || null : null);
        currentAgentWillExpire = false;
      }
      if (replaceEnabledAgents || data.enabledAgents) {
        enabledAgents = new Set(data.enabledAgents || (data.session && data.session.enabledAgents) || []);
      }
      if (replaceAgentWorkdirs) {
        agentWorkdirs = data.agentWorkdirs || (data.session && data.session.agentWorkdirs) || {};
      }

      chatSessions = data.chatSessions || chatSessions;
      activeSessionId = data.activeSessionId || (data.session && data.session.id) || null;
      syncSessionSettingsState(data.session || null);

      renderSessionList();
      renderAgentsList();
      updateCurrentAgentUI();
      renderMessages();
    }

    async function saveSessionSettings(patch, successMessage) {
      if (!activeSessionId) {
        setSessionSettingsFeedback('请先选择一个会话。', 'error');
        return;
      }

      setSessionSettingsFeedback('正在保存...');

      try {
        const response = await fetch('/api/sessions/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ sessionId: activeSessionId, patch })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          if (data.session) {
            syncSessionSettingsState(data.session);
          } else {
            await loadHistory();
            await loadGroups();
          }
          const message = data.error || '保存失败';
          setSessionSettingsFeedback(message, 'error');
          alert(message);
          return;
        }

        applySessionResponseData(data, { replaceEnabledAgents: true });
        setSessionSettingsFeedback(successMessage, 'success');
      } catch (error) {
        console.error('保存会话链路设置失败:', error);
        await loadHistory();
        await loadGroups();
        setSessionSettingsFeedback(error.message || '保存失败', 'error');
        alert(error.message || '保存失败');
      }
    }

    async function saveAgentChainMaxHops() {
      try {
        const value = parsePositiveIntegerSetting(agentChainMaxHops, '最多传播轮数');
        await saveSessionSettings({ agentChainMaxHops: value }, '传播轮数已更新。');
      } catch (error) {
        setSessionSettingsFeedback(error.message, 'error');
      }
    }

    async function saveAgentChainMaxCallsPerAgent() {
      try {
        const value = parsePositiveIntegerSetting(agentChainMaxCallsPerAgent, '单个智能体最多调用次数');
        await saveSessionSettings({ agentChainMaxCallsPerAgent: value }, '同智能体调用上限已更新。');
      } catch (error) {
        setSessionSettingsFeedback(error.message, 'error');
      }
    }

    async function saveDiscussionMode(nextMode) {
      const normalizedMode = nextMode === 'peer' ? 'peer' : 'classic';
      discussionMode = normalizedMode;
      renderSessionSettings();
      await saveSessionSettings({ discussionMode: normalizedMode }, normalizedMode === 'peer' ? '已切换为对等讨论。' : '已切换为经典链式。');
    }

    function handleAgentChainUnlimitedToggle(isUnlimited) {
      agentChainMaxCallsUnlimitedInputEls.forEach((peer) => {
        peer.checked = !!isUnlimited;
      });

      if (isUnlimited) {
        void saveSessionSettings({ agentChainMaxCallsPerAgent: null }, '同智能体调用上限已切换为不限制。');
        return;
      }

      agentChainMaxCallsPerAgent = activeSession && Number.isInteger(activeSession.agentChainMaxCallsPerAgent)
        ? activeSession.agentChainMaxCallsPerAgent
        : '';
      renderSessionSettings();
      setSessionSettingsFeedback('请填写单个智能体最多调用次数后再保存。');
    }

    function renderSessionList() {
      const visibleSessions = getVisibleSessions();
      const optionsHtml = visibleSessions.length > 0
        ? visibleSessions.map(session => `
        <option value="${session.id}" ${session.id === activeSessionId ? 'selected' : ''}>
          ${escapeHtml(session.name)} (${session.messageCount})
        </option>
      `).join('')
        : '<option value="">没有匹配的会话，请尝试其他关键词</option>';

      sessionSelectEl.innerHTML = optionsHtml;
      sessionSelectMobileEl.innerHTML = optionsHtml;
      renderRecentSessions();

       const current = chatSessions.find(session => session.id === activeSessionId);
       if (activeSessionBadgeEl) {
         activeSessionBadgeEl.textContent = current ? current.name : '当前会话';
       }
    }

    function renderContextTab() {
      const allTabs = document.querySelectorAll('.context-tab');
      allTabs.forEach((tab) => {
        const isActive = tab.dataset.tab === activeContextTab;
        tab.classList.toggle('is-active', isActive);
      });

      const contextTriggers = document.querySelectorAll('.utility-rail__btn[data-tab], .btn-desktop-context[data-tab]');
      contextTriggers.forEach((trigger) => {
        const triggerTab = trigger.dataset.tab;
        const isDesktopOpen = contextPanelEl && contextPanelEl.classList.contains('is-open');
        const isActive = triggerTab === activeContextTab && isDesktopOpen;
        trigger.classList.toggle('is-active', isActive);
      });

      const allSections = document.querySelectorAll('.context-section');
      allSections.forEach((section) => {
        const isActive = section.dataset.section === activeContextTab;
        section.classList.toggle('is-active', isActive);
      });
    }

    function setContextTab(tab) {
      activeContextTab = tab || 'sessions';
      renderContextTab();
    }

    function openContextPanel(tab = activeContextTab) {
      activeContextTab = tab || activeContextTab;
      contextPanelEl.classList.add('is-open');
      document.body.classList.add('context-panel-open');
      renderContextTab();
    }

    function closeContextPanel() {
      contextPanelEl.classList.remove('is-open');
      document.body.classList.remove('context-panel-open');
      renderContextTab();
    }

    function toggleContextPanel(tab = activeContextTab) {
      if (contextPanelEl.classList.contains('is-open') && activeContextTab === tab) {
        closeContextPanel();
        return;
      }
      openContextPanel(tab);
    }

    function closeMobileOverlays() {
      closeMobileControlHub();
      if (window.ChatComposer && typeof window.ChatComposer.closeMobileComposerDrawer === 'function') {
        window.ChatComposer.closeMobileComposerDrawer();
      }
    }

    function openMobileControlHub(tab = activeContextTab) {
      activeContextTab = tab || activeContextTab;
      if (typeof window.closeMobileComposerDrawer === 'function') {
        window.closeMobileComposerDrawer();
      }
      mobileControlSheetBackdropEl.style.display = 'flex';
      mobileControlSheetBackdropEl.classList.add('is-open');
      document.body.classList.add('sheet-open');
      renderContextTab();
    }

    function closeMobileControlHub(event) {
      if (event && event.target !== mobileControlSheetBackdropEl) return;
      mobileControlSheetBackdropEl.classList.remove('is-open');
      mobileControlSheetBackdropEl.style.display = 'none';
      document.body.classList.remove('sheet-open');
    }

    async function switchSession(sessionId) {
      if (!sessionId || sessionId === activeSessionId || isLoading) return;
      try {
        const response = await fetch('/api/sessions/select', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ sessionId })
        });
        if (!response.ok) {
          alert('切换会话失败');
          renderSessionList();
          return;
        }
        const data = await response.json();
        applySessionResponseData(data, {
          replaceMessages: true,
          replaceCurrentAgent: true,
          replaceEnabledAgents: true,
          replaceAgentWorkdirs: true
        });
        closeMobileControlHub();
      } catch (error) {
        console.error('切换会话失败:', error);
        alert('切换会话失败');
        renderSessionList();
      }
    }

    async function createSession() {
      const name = prompt('请输入新会话名称（可选）') || '';
      const response = await fetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ name })
      });
      if (!response.ok) {
        alert('创建会话失败');
        return;
      }
      const data = await response.json();
      applySessionResponseData(data, {
        replaceMessages: true,
        replaceCurrentAgent: true,
        replaceEnabledAgents: true,
        replaceAgentWorkdirs: true
      });
    }

    async function renameSession() {
      if (!activeSessionId) return;
      const current = chatSessions.find(item => item.id === activeSessionId);
      const name = prompt('请输入新的会话名称', current ? current.name : '');
      if (name === null) return;

      const response = await fetch('/api/sessions/rename', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ sessionId: activeSessionId, name })
      });
      if (!response.ok) {
        alert('重命名失败');
        return;
      }

      const data = await response.json();
      if (data.session && activeSessionId && data.session.id === activeSessionId) {
        syncSessionSettingsState({ ...(activeSession || {}), ...data.session });
      }
      chatSessions = data.chatSessions || chatSessions;
      renderSessionList();
    }

    async function deleteSession() {
      if (!activeSessionId) return;
      if (!confirm('确定删除当前会话吗？该会话中的消息将丢失。')) return;

      const response = await fetch('/api/sessions/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ sessionId: activeSessionId })
      });

      const data = await response.json();
      if (!response.ok) {
        alert(data.error || '删除失败');
        return;
      }

      history = data.messages || [];
      currentAgent = data.currentAgent || null;
      currentAgentWillExpire = false;
      enabledAgents = new Set(data.enabledAgents || []);
      activeSessionId = data.activeSessionId || null;
      chatSessions = data.chatSessions || [];
      agentWorkdirs = (data.session && data.session.agentWorkdirs) || {};
      syncSessionSettingsState(data.session || null);
      renderSessionList();
      renderAgentsList();
      updateCurrentAgentUI();
      renderMessages();
      closeMobileControlHub();
    }

    function isStandaloneMode() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    }

    function setupPwaBanner() {
      if (localStorage.getItem('pwa-banner-dismissed') === '1' || isStandaloneMode()) return;

      pwaBannerEl.style.display = 'flex';
      if (isIOS()) {
        pwaBannerTextEl.textContent = 'iOS 安装提示：点击浏览器分享按钮，再选择“添加到主屏幕”。';
      }
    }

    function dismissPwaBanner() {
      localStorage.setItem('pwa-banner-dismissed', '1');
      pwaBannerEl.style.display = 'none';
    }

    // ============================================
    // 智能体管理
    // ============================================

    async function loadAgents() {
      try {
        const response = await fetch('/api/agents', { credentials: 'include', cache: 'no-store' });
        if (response.ok) {
          const data = await response.json();
          agents = data.agents || [];
          renderAgentsList();
        }
      } catch (error) {
        console.error('加载智能体失败:', error);
      }
    }

    function getSortedAgents() {
      return [...agents].sort((a, b) => {
        const aEnabled = enabledAgents.has(a.name) ? 0 : 1;
        const bEnabled = enabledAgents.has(b.name) ? 0 : 1;
        if (aEnabled !== bEnabled) return aEnabled - bEnabled;
        return agents.findIndex(item => item.name === a.name) - agents.findIndex(item => item.name === b.name);
      });
    }

    function getGroupedAgents() {
      const result = [];
      const groupedNames = new Set();

      // Defined groups first
      for (const group of groups) {
        const agentsInGroup = agents.filter(a => group.agentNames.includes(a.name));
        if (agentsInGroup.length > 0) {
          result.push({
            id: group.id,
            name: group.name,
            icon: group.icon,
            agents: agentsInGroup,
            agentNames: group.agentNames,
            isUngrouped: false
          });
          group.agentNames.forEach(name => groupedNames.add(name));
        }
      }

      // Ungrouped agents
      const ungrouped = agents.filter(a => !groupedNames.has(a.name));
      if (ungrouped.length > 0) {
        result.push({
          id: '__ungrouped__',
          name: '其他',
          icon: '📦',
          agents: ungrouped,
          agentNames: ungrouped.map(a => a.name),
          isUngrouped: true
        });
      }

      return result;
    }

    function updateAgentZeroState() {
      if (!agentZeroStateEl) return;
      const hasEnabledAgents = Array.from(enabledAgents).length > 0;
      agentZeroStateEl.style.display = hasEnabledAgents ? 'none' : 'flex';
      if (mobileAgentsMirrorEl) {
        const zeroState = mobileAgentsMirrorEl.querySelector('.agent-zero-state--mobile');
        if (zeroState) {
          zeroState.style.display = hasEnabledAgents ? 'none' : 'flex';
        }
      }
    }

    function renderAgentsList() {
      const groupedAgents = getGroupedAgents();
      const agentsHtml = groupedAgents.map(group => {
        const isExpanded = expandedGroups.has(group.id);
        const isActive = activeGroup === group.id;

        const groupHeader = `
          <div class="agent-group-header ${isActive ? 'agent-group-header--active' : ''}" onclick="toggleGroupExpand('${group.id}')">
            <span class="group-expand-icon">${isExpanded ? '▼' : '▶'}</span>
            <span class="group-icon">${group.icon}</span>
            <span class="group-name">${group.name}</span>
            <span class="group-count">(${group.agents.length})</span>
            <button
              type="button"
              class="group-switch-btn"
              onclick="event.stopPropagation(); handleGroupSwitchById('${group.id}')"
            >
              切换
            </button>
          </div>
        `;

        if (!isExpanded) {
          return `<div class="agent-group">${groupHeader}</div>`;
        }

        const agentsItems = group.agents.map(agent => {
          const isEnabled = enabledAgents.has(agent.name);
          const disabledClass = isEnabled ? '' : ' agent-tag--disabled';
          const checked = isEnabled ? 'checked' : '';
          const disabledAttr = isEnabled ? '' : 'aria-disabled="true"';
          return `
            <span class="agent-tag${disabledClass}" style="--agent-color: ${agent.color}" title="@${agent.name}" ${disabledAttr} onclick="selectAgent('${agent.name}')">
              <span class="agent-tag__main">
                ${agent.avatar} ${agent.name}
              </span>
              <button
                type="button"
                class="agent-tag__toggle"
                role="switch"
                aria-checked="${checked ? 'true' : 'false'}"
                onclick="event.stopPropagation(); toggleSessionAgent('${agent.name}', ${!isEnabled})"
              >
                <span class="agent-tag__toggle-track">
                  <span class="agent-tag__toggle-thumb"></span>
                </span>
              </button>
            </span>
          `;
        }).join('');

        return `
          <div class="agent-group">
            ${groupHeader}
            <div class="agent-group-members">${agentsItems}</div>
          </div>
        `;
      }).join('');

      agentsListEl.innerHTML = agentsHtml;
      if (mobileAgentsMirrorEl) {
        mobileAgentsMirrorEl.innerHTML = `
          <div class="agents-bar agents-bar--mobile">
            <span class="agents-label">智能体</span>
            <div class="agents-list">${agentsHtml}</div>
          </div>
          <div class="agent-zero-state agent-zero-state--mobile"><strong>当前会话还没有启用智能体</strong><span>请先启用一个智能体，再开始对话。</span></div>
        `;
      }
      updateAgentZeroState();
    }

    function selectAgent(name) {
      const agent = agents.find(a => a.name === name);
      if (agent && enabledAgents.has(agent.name)) {
        userInputEl.value = `@${name} ` + userInputEl.value;
        resizeUserInput();
        userInputEl.focus();
      }
    }

    function toggleGroupExpand(groupId) {
      if (expandedGroups.has(groupId)) {
        expandedGroups.delete(groupId);
      } else {
        expandedGroups.add(groupId);
      }
      renderAgentsList();
    }

    function handleGroupSwitchById(groupId) {
      const groupedAgents = getGroupedAgents();
      const group = groupedAgents.find(g => g.id === groupId);
      if (group) {
        handleGroupSwitch(group);
      }
    }

    async function handleGroupSwitch(group) {
      const targetNames = new Set(group.agentNames);
      const previousEnabled = new Set(enabledAgents);
      activeGroup = group.id;

      // 先在 UI 上立即更新
      enabledAgents = targetNames;
      renderAgentsList();

      // 将变更同步到服务端
      for (const agent of agents) {
        const shouldEnable = targetNames.has(agent.name);
        const wasEnabled = previousEnabled.has(agent.name);
        if (shouldEnable !== wasEnabled) {
          await toggleSessionAgentSilent(agent.name, shouldEnable);
        }
      }
    }

    async function toggleSessionAgentSilent(name, enabled) {
      try {
        const response = await fetch('/api/session-agents', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agentName: name, enabled })
        });
        const data = await response.json();
        if (response.ok) {
          enabledAgents = new Set(data.enabledAgents || []);
          currentAgentWillExpire = !!data.currentAgentWillExpire;
        }
      } catch (e) {
        console.error('Failed to sync agent state:', e);
      }
    }

    function getMentionCandidates() {
      const list = agents.filter(agent => enabledAgents.has(agent.name)).map(agent => ({
        type: 'agent',
        name: agent.name,
        avatar: agent.avatar,
        color: agent.color
      }));

      if (list.length > 0) {
        list.unshift({
          type: 'all',
          name: '所有人',
          alias: 'all',
          avatar: '📣',
          color: '#ec4899'
        });
      }

      return list;
    }

    async function toggleSessionAgent(name, nextEnabled) {
      try {
        const response = await fetch('/api/session-agents', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agentName: name, enabled: nextEnabled })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || '切换智能体失败');
        }
        enabledAgents = new Set(data.enabledAgents || []);
        currentAgentWillExpire = !!data.currentAgentWillExpire;
        renderAgentsList();
        updateCurrentAgentUI();
        renderMessages();
      } catch (error) {
        alert('切换智能体失败: ' + error.message);
      }
    }

    function hideMentionSuggestions() {
      mentionState.visible = false;
      mentionSuggestionsEl.style.display = 'none';
      mentionSuggestionsEl.innerHTML = '';
    }

    function renderMentionSuggestions() {
      if (!mentionState.visible || mentionState.items.length === 0) {
        hideMentionSuggestions();
        return;
      }

      mentionSuggestionsEl.style.display = 'block';
      mentionSuggestionsEl.innerHTML = mentionState.items.map((item, index) => {
        const selectedClass = index === mentionState.selectedIndex ? 'mention-suggestion--active' : '';
        const secondary = item.type === 'all' ? '<span class="mention-suggestion__desc">@all</span>' : '<span class="mention-suggestion__desc">智能体</span>';

        return `
          <button
            type="button"
            class="mention-suggestion ${selectedClass}"
            data-index="${index}"
            onclick="selectMentionSuggestion(${index})"
          >
            <span class="mention-suggestion__main">
              <span class="mention-suggestion__avatar">${item.avatar}</span>
              <span class="mention-suggestion__name" style="color: ${item.color};">@${escapeHtml(item.name)}</span>
            </span>
            ${secondary}
          </button>
        `;
      }).join('');
    }

    function updateMentionSuggestions() {
      const value = userInputEl.value;
      const cursor = userInputEl.selectionStart ?? value.length;
      const beforeCursor = value.slice(0, cursor);
      const atIndex = beforeCursor.lastIndexOf('@');

      if (atIndex < 0) {
        hideMentionSuggestions();
        return;
      }

      const prefix = beforeCursor.slice(atIndex + 1);
      if (/\s/.test(prefix) || prefix.includes('@')) {
        hideMentionSuggestions();
        return;
      }

      const normalizedPrefix = prefix.toLowerCase();
      const allCandidates = getMentionCandidates();
      const filtered = allCandidates.filter(item => {
        const names = [item.name, item.alias || ''];
        return names.some(name => name.toLowerCase().startsWith(normalizedPrefix));
      });

      if (filtered.length === 0) {
        hideMentionSuggestions();
        return;
      }

      mentionState.visible = true;
      mentionState.items = filtered;
      mentionState.selectedIndex = 0;
      mentionState.tokenStart = atIndex;
      renderMentionSuggestions();
    }

    function applyMentionSuggestion(index) {
      const item = mentionState.items[index];
      if (!item) return;

      const value = userInputEl.value;
      const cursor = userInputEl.selectionStart ?? value.length;
      const before = value.slice(0, mentionState.tokenStart);
      const after = value.slice(cursor);
      const mentionText = `@${item.name} `;

      userInputEl.value = `${before}${mentionText}${after}`;
      const nextCursor = (before + mentionText).length;
      resizeUserInput();
      userInputEl.setSelectionRange(nextCursor, nextCursor);
      hideMentionSuggestions();
      if (!window.matchMedia('(max-width: 960px)').matches) {
        userInputEl.focus();
      }
    }

    function selectMentionSuggestion(index) {
      applyMentionSuggestion(index);
    }

    function resizeUserInput() {
      if (!userInputEl) return;
      userInputEl.style.height = 'auto';
      userInputEl.style.height = `${Math.min(userInputEl.scrollHeight, 160)}px`;
    }

    // 检测输入中的分组提及
    function detectGroupMention(text) {
      // Prevent ReDoS by limiting input length
      if (text.length > 10000) return null;

      // Limit mention length to 50 chars
      const mentionRegex = /@([^\s@，。！？、]{1,50})/g;
      const matches = text.match(mentionRegex);
      if (!matches) return null;

      for (const match of matches) {
        const mentionName = match.slice(1); // 去掉 @
        // 检查是否是分组名（按 id 或 name 匹配）
        const group = groups.find(g =>
          g.id === mentionName || g.name === mentionName
        );
        if (group) {
          return group;
        }
      }
      return null;
    }

    // Escape special characters for regex
    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

  // 渲染分组提及预览
    function renderGroupMentionPreview() {
      if (!groupMentionPreview || !groupMentionPreviewEl || !groupMentionPreview.agentNames) {
        if (groupMentionPreviewEl) {
          groupMentionPreviewEl.style.display = 'none';
          groupMentionPreviewEl.innerHTML = '';
        }
        return;
      }

      const agentsHtml = groupMentionPreview.agentNames.map(name => {
        const agent = agents.find(a => a.name === name);
        if (!agent) return '';  // Skip missing agents
        return `
          <span class="preview-agent">
            ✓ ${agent.avatar || '🤖'} ${escapeHtml(name)}
          </span>
        `;
      }).filter(html => html).join('');

      groupMentionPreviewEl.innerHTML = `
        <div class="preview-header">
          <span class="preview-icon">${escapeHtml(groupMentionPreview.icon)}</span>
          <span class="preview-name">${escapeHtml(groupMentionPreview.name)}</span>
          <span class="preview-count">(${groupMentionPreview.agentNames.length} 个智能体)</span>
        </div>
        <div class="preview-agents">
          ${agentsHtml}
        </div>
        <div class="preview-actions">
          <button class="confirm-btn" onclick="confirmGroupMention()">确认召唤</button>
          <button class="cancel-btn" onclick="cancelGroupMention()">取消</button>
        </div>
      `;
      groupMentionPreviewEl.style.display = 'block';
    }

    // 确认分组提及
    function confirmGroupMention() {
      if (!groupMentionPreview) return;

      // 将 @分组名 替换为 @智能体1 @智能体2 ...
      const agentMentions = groupMentionPreview.agentNames
        .map(name => `@${name}`)
        .join(' ');
      const newText = userInputEl.value.replace(
        new RegExp(`@(${escapeRegExp(groupMentionPreview.id)}|${escapeRegExp(groupMentionPreview.name)})`),
        agentMentions + ' '
      );
      userInputEl.value = newText;
      groupMentionPreview = null;
      renderGroupMentionPreview();
      resizeUserInput();
      userInputEl.focus();
    }

    // 取消分组提及
    function cancelGroupMention() {
      // 移除 @分组名
      if (!groupMentionPreview) return;
      const newText = userInputEl.value.replace(
        new RegExp(`\\s*@(${escapeRegExp(groupMentionPreview.id)}|${escapeRegExp(groupMentionPreview.name)})\\s*`),
        ' '
      ).trim();
      userInputEl.value = newText;
      groupMentionPreview = null;
      renderGroupMentionPreview();
      resizeUserInput();
      userInputEl.focus();
    }

    function switchAgent() {
      currentAgent = null;
      currentAgentWillExpire = false;
      updateCurrentAgentUI();
      userInputEl.placeholder = '输入消息... 使用 @智能体名 召唤 AI';
    }

    function setSelectOptions(selectEl, options, placeholder) {
      if (!selectEl) return;
      selectEl.innerHTML = `<option value="">${escapeHtml(placeholder)}</option>` + options.map(item => {
        const value = escapeHtml(item.path || '');
        const label = escapeHtml(item.name || item.path || '');
        return `<option value="${value}">${label}</option>`;
      }).join('');
    }

    function updateChatWorkdirPreview() {
      if (!chatWorkdirPreviewEl) return;
      const value = chatWorkdirState.level3 || chatWorkdirState.level2 || chatWorkdirState.root || chatWorkdirState.custom || '';
      chatWorkdirPreviewEl.value = value;
      renderMobileWorkdirMirror();
    }

    function setFocusSummary(content) {
      if (!focusAgentSummaryEl) return;
      focusAgentSummaryEl.innerHTML = `
        <span class="focus-summary-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M8 4.5H5.5V7M16 4.5h2.5V7M8 19.5H5.5V17M16 19.5h2.5V17M8.5 12a3.5 3.5 0 1 0 7 0a3.5 3.5 0 0 0-7 0Z" />
          </svg>
        </span>
        <span class="focus-agent-inline">${content}</span>
      `;
    }

    function initializeChatWorkdirSelectors() {
      setSelectOptions(agentWorkdirRootEl, [], '默认进程目录');
      setSelectOptions(agentWorkdirLevel2El, [], '请选择一级目录');
      setSelectOptions(agentWorkdirLevel3El, [], '请选择二级目录');
      updateChatWorkdirPreview();
    }

    async function fetchChatWorkdirOptions(pathname) {
      const query = pathname ? `?path=${encodeURIComponent(pathname)}` : '';
      const response = await fetch(`/api/system/dirs${query}`, { credentials: 'include', cache: 'no-store' });
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error || '加载目录失败');
      }
      return data.directories || [];
    }

    async function loadChatWorkdirHierarchy(prefillPath = '') {
      const rootOptions = await fetchChatWorkdirOptions('/');
      setSelectOptions(agentWorkdirRootEl, rootOptions, '默认进程目录');
      setSelectOptions(agentWorkdirLevel2El, [], '请选择一级目录');
      setSelectOptions(agentWorkdirLevel3El, [], '请选择二级目录');

      chatWorkdirState.root = '';
      chatWorkdirState.level2 = '';
      chatWorkdirState.level3 = '';
      chatWorkdirState.custom = '';

      if (!prefillPath) {
        updateChatWorkdirPreview();
        return;
      }

      const segments = prefillPath.split('/').filter(Boolean);
      if (segments.length === 0) {
        updateChatWorkdirPreview();
        return;
      }

      const rootPath = `/${segments[0]}`;
      const hasRoot = Array.from(agentWorkdirRootEl.options).some(option => option.value === rootPath);
      if (!hasRoot) {
        chatWorkdirState.custom = prefillPath;
        updateChatWorkdirPreview();
        return;
      }

      agentWorkdirRootEl.value = rootPath;
      chatWorkdirState.root = rootPath;

      const level2Options = await fetchChatWorkdirOptions(rootPath);
      setSelectOptions(agentWorkdirLevel2El, level2Options, '请选择一级目录');
      if (segments.length < 2) {
        updateChatWorkdirPreview();
        return;
      }

      const level2Path = `${rootPath}/${segments[1]}`;
      const hasLevel2 = Array.from(agentWorkdirLevel2El.options).some(option => option.value === level2Path);
      if (!hasLevel2) {
        chatWorkdirState.custom = prefillPath;
        updateChatWorkdirPreview();
        return;
      }

      agentWorkdirLevel2El.value = level2Path;
      chatWorkdirState.level2 = level2Path;

      const level3Options = await fetchChatWorkdirOptions(level2Path);
      setSelectOptions(agentWorkdirLevel3El, level3Options, '请选择二级目录');
      if (segments.length < 3) {
        updateChatWorkdirPreview();
        return;
      }

      const level3Path = `${level2Path}/${segments[2]}`;
      const hasLevel3 = Array.from(agentWorkdirLevel3El.options).some(option => option.value === level3Path);
      if (!hasLevel3) {
        chatWorkdirState.custom = prefillPath;
      } else {
        agentWorkdirLevel3El.value = level3Path;
        chatWorkdirState.level3 = level3Path;
      }
      updateChatWorkdirPreview();
    }

    async function onChatWorkdirRootChange() {
      chatWorkdirState.root = agentWorkdirRootEl.value || '';
      chatWorkdirState.level2 = '';
      chatWorkdirState.level3 = '';
      chatWorkdirState.custom = '';
      setSelectOptions(agentWorkdirLevel3El, [], '请选择二级目录');
      if (!chatWorkdirState.root) {
        setSelectOptions(agentWorkdirLevel2El, [], '请选择一级目录');
        updateChatWorkdirPreview();
        return;
      }
      const children = await fetchChatWorkdirOptions(chatWorkdirState.root);
      setSelectOptions(agentWorkdirLevel2El, children, '请选择一级目录');
      updateChatWorkdirPreview();
    }

    async function onChatWorkdirLevel2Change() {
      chatWorkdirState.level2 = agentWorkdirLevel2El.value || '';
      chatWorkdirState.level3 = '';
      chatWorkdirState.custom = '';
      if (!chatWorkdirState.level2) {
        setSelectOptions(agentWorkdirLevel3El, [], '请选择二级目录');
        updateChatWorkdirPreview();
        return;
      }
      const children = await fetchChatWorkdirOptions(chatWorkdirState.level2);
      setSelectOptions(agentWorkdirLevel3El, children, '请选择二级目录');
      updateChatWorkdirPreview();
    }

    function onChatWorkdirLevel3Change() {
      chatWorkdirState.level3 = agentWorkdirLevel3El.value || '';
      chatWorkdirState.custom = '';
      updateChatWorkdirPreview();
    }

    async function loadWorkdirOptions() {
      try {
        await loadChatWorkdirHierarchy(currentAgent ? (agentWorkdirs[currentAgent] || '') : '');
      } catch (error) {
        initializeChatWorkdirSelectors();
        console.error('加载工作目录选项失败:', error);
      }
    }

    async function applyAgentWorkdir() {
      if (!currentAgent) return;
      const workdir = chatWorkdirPreviewEl.value || '';
      try {
        const response = await fetch('/api/workdirs/select', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agentName: currentAgent, workdir })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || '设置失败');
        if (workdir) {
          agentWorkdirs[currentAgent] = workdir;
        } else {
          delete agentWorkdirs[currentAgent];
        }
        await loadChatWorkdirHierarchy(workdir);
      } catch (error) {
        alert('设置工作目录失败: ' + error.message);
      }
    }

    function updateCurrentAgentUI() {
      if (currentAgent) {
        const agent = agents.find(a => a.name === currentAgent);
        currentAgentBarEl.style.display = 'flex';
        workdirBarEl.style.display = 'flex';
        currentAgentNameEl.textContent = `${agent ? agent.avatar : '🤖'} ${currentAgent}`;
        currentAgentNameEl.style.color = agent ? agent.color : 'var(--accent)';
        currentAgentExpiryHintEl.style.display = currentAgentWillExpire ? 'inline-flex' : 'none';
        setFocusSummary(`${agent ? agent.avatar : '🤖'} ${escapeHtml(currentAgent)}`);
        contextWorkdirEmptyEl.style.display = 'none';
        userInputEl.placeholder = `发送消息给 ${currentAgent}...`;
        loadChatWorkdirHierarchy(agentWorkdirs[currentAgent] || '').catch(error => {
          initializeChatWorkdirSelectors();
          console.error('加载工作目录层级失败:', error);
        });
      } else {
        currentAgentBarEl.style.display = 'none';
        currentAgentExpiryHintEl.style.display = 'none';
        workdirBarEl.style.display = 'none';
        setFocusSummary('尚未锁定智能体');
        contextWorkdirEmptyEl.style.display = 'block';
        userInputEl.placeholder = '输入消息... 使用 @智能体名 召唤 AI';
      }
      renderMobileWorkdirMirror();
    }

    function renderMobileWorkdirMirror() {
      if (!mobileWorkdirMirrorEl) return;

      if (!currentAgent) {
        mobileWorkdirMirrorEl.innerHTML = '<div class="context-workdir-empty">选择一个当前对话智能体后，这里会显示目录层级选择。</div>';
        return;
      }

      mobileWorkdirMirrorEl.innerHTML = `
        <div class="mobile-current-agent">${currentAgentNameEl ? currentAgentNameEl.textContent : currentAgent}</div>
        <div class="mobile-workdir-preview">${escapeHtml(chatWorkdirPreviewEl ? (chatWorkdirPreviewEl.value || '默认进程目录') : '默认进程目录')}</div>
        <p class="mobile-workdir-hint">工作目录层级选择请在桌面上下文面板中完成，移动端保留当前结果预览。</p>
      `;
    }

    // ============================================
    // 渲染函数
    // ============================================

    function getAgentInfo(name) {
      return agents.find(a => a.name === name);
    }

    function getSenderColor(sender, role) {
      if (role === 'user') return null;
      const agent = getAgentInfo(sender);
      return agent ? agent.color : null;
    }

    function getSenderAvatar(sender, role) {
      if (role === 'user') return '👤';
      const agent = getAgentInfo(sender);
      return agent ? agent.avatar : '🤖';
    }

    function renderCard(block) {
      const toneClass = `card--${block.tone || 'info'}`;
      const icon = {
        info: 'ℹ️',
        success: '✅',
        warning: '⚠️'
      }[block.tone] || 'ℹ️';

      return `
        <div class="card ${toneClass}">
          <div class="card__icon">${icon}</div>
          <div class="card__content">
            <div class="card__title">${escapeHtml(block.title)}</div>
            <div class="card__body">${escapeHtml(block.body)}</div>
          </div>
        </div>
      `;
    }

    function renderChecklist(block) {
      const items = block.items || [];
      const doneCount = items.filter(item => item.done).length;

      return `
        <div class="checklist">
          <div class="checklist__header">
            <span class="checklist__title">${escapeHtml(block.title)}</span>

          </div>
          <ul class="checklist__items">

              <li class="checklist__item ${item.done ? 'checklist__item--done' : ''}">
                <span class="checklist__checkbox">${item.done ? '✓' : ''}</span>
                <span class="checklist__text">${escapeHtml(item.text)}</span>

    function renderBlocks(blocks) {
      if (!blocks || blocks.length === 0) return '';

      return blocks.map(block => {
        switch (block.kind) {
          case 'card':
            return renderCard(block);
          case 'checklist':
            return renderChecklist(block);
          default:
            return `<div class="unknown-block">[未知块: ${block.kind}]</div>`;

    }

    function highlightMentions(text) {
      // @@AgentName → 链式调用样式（优先匹配）
      let result = text.replace(/@@([^\s@，。！？、,:：；;]+)/g, '<span class="mention mention--invoke">@@$1</span>');
      // @AgentName → 普通引用样式
      result = result.replace(/@([^\s@，。！？、,:：；;]+)/g, '<span class="mention">@$1</span>');

    function getInvocationReviewActionMeta(reviewAction) {
      const normalizedAction = typeof reviewAction === 'string' ? reviewAction.trim().toLowerCase() : '';
      switch (normalizedAction) {
        case 'accept':
          return { label: '已接受', tone: 'success' };
        case 'follow_up':
          return { label: '需跟进', tone: 'info' };
        case 'retry':

    function renderInvocationReviewMessageContent(msg, colorStyle = '') {
      const reviewDisplayText = msg.reviewDisplayText || msg.text || '无评审摘要';
      const callerAgentName = msg.callerAgentName || '未知调用方';
      const calleeAgentName = msg.calleeAgentName || '未知被调用方';
      const reviewRawText = msg.reviewRawText || '';
      const actionMeta = getInvocationReviewActionMeta(msg.reviewAction);
      const reviewSummaryHtml = window.ChatMarkdown.renderMarkdownHtml(reviewDisplayText, {
        role: msg.role || 'assistant',
        enableMentions: true
      });

      const rawDetailsMarkup = reviewRawText
        ? `
          <details class="invocation-review-raw">

      return `

          <div class="invocation-review-card__header">
