    function renderGraphDetailGroups(callGraph) {
      if (!callGraph || !Array.isArray(callGraph.nodes) || callGraph.nodes.length === 0) {
        return '<div class="message__graph-empty">暂无可展示的调用图详情</div>';
      }

      const sourceNodes = callGraph.nodes.filter(node => node.kind === 'message' && node.subtype === 'user');
      const executionNodes = callGraph.nodes.filter(node => node.kind === 'execution');
      const focusNodes = callGraph.nodes.filter(node => node.isFocus);
      const cycleEdges = callGraph.edges.filter(edge => edge.isCycleEdge);

      const groups = [
        { title: '触发源', items: sourceNodes.map(node => `${node.label}${node.actorName ? ` · ${node.actorName}` : ''}`) },
        { title: '执行', items: executionNodes.map(node => `${node.label}${node.status ? ` · ${node.status}` : ''}`) },
        { title: '当前消息', items: focusNodes.map(node => `${node.label}${node.actorName ? ` · ${node.actorName}` : ''}`) },
        { title: '环回关系', items: cycleEdges.map(edge => `${edge.from.replace(/^execution:/, '')} → ${edge.to.replace(/^execution:/, '')}`) }
      ].filter(group => group.items.length > 0);

      return groups.map(group => `
        <section class="message__graph-group">
          <h4>${escapeHtml(group.title)}</h4>
          <ul>
            ${group.items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
          </ul>
        </section>
      `).join('');
    }

    const MINI_GRAPH_CORE_LIMIT = 8;

    function selectCoreGraph(callGraph) {
      if (!callGraph || !Array.isArray(callGraph.nodes)) {
        return null;
      }

      const nodeIndex = new Map();
      callGraph.nodes.forEach((node, index) => {
        nodeIndex.set(node.id, index);
      });

      const neighborMap = new Map();
      const addNeighbor = (id, target) => {
        if (!target || id === target) return;
        const neighbors = neighborMap.get(id) || new Set();
        neighbors.add(target);
        neighborMap.set(id, neighbors);
      };

      if (Array.isArray(callGraph.edges)) {
        for (const edge of callGraph.edges) {
          addNeighbor(edge.from, edge.to);
          addNeighbor(edge.to, edge.from);
        }
      }

      const limit = MINI_GRAPH_CORE_LIMIT;
      const focusId = callGraph.focusNodeId;
      const ordered = [];
      const seen = new Set();
      const enqueue = [];

      const enqueueNeighbors = (rootId) => {
        const neighbors = Array.from(neighborMap.get(rootId) || []);
        neighbors.sort((a, b) => (nodeIndex.get(a) ?? Infinity) - (nodeIndex.get(b) ?? Infinity));
        for (const neighbor of neighbors) {
          if (seen.has(neighbor)) continue;
          enqueue.push(neighbor);
          seen.add(neighbor);
        }
      };

      if (focusId && nodeIndex.has(focusId)) {
        ordered.push(callGraph.nodes[nodeIndex.get(focusId)]);
        seen.add(focusId);
        enqueueNeighbors(focusId);
      }

      while (enqueue.length > 0 && ordered.length < limit) {
        const nextId = enqueue.shift();
        if (!nextId) continue;
        const node = callGraph.nodes[nodeIndex.get(nextId)];
        if (!node) continue;
        ordered.push(node);
        enqueueNeighbors(nextId);
      }

      if (ordered.length < limit) {
        for (const node of callGraph.nodes) {
          if (ordered.length >= limit) break;
          if (seen.has(node.id)) continue;
          ordered.push(node);
          seen.add(node.id);
        }
      }

      const selectedIds = new Set(ordered.map(node => node.id));
      const edges = Array.isArray(callGraph.edges)
        ? callGraph.edges.filter(edge => selectedIds.has(edge.from) && selectedIds.has(edge.to))
        : [];

      return {
        focusNodeId: focusId,
        nodes: ordered,
        edges
      };
    }

    function assignGraphDepths(nodes, edges = [], focusNodeId) {
      if (!Array.isArray(nodes)) {
        return { depthMap: {}, columnCounter: {}, layoutNodes: [], incoming: new Map() };
      }

      const depthMap = {};
      const incoming = new Map();
      const outgoing = new Map();

      for (const edge of edges) {
        const forward = outgoing.get(edge.from) || [];
        forward.push(edge.to);
        outgoing.set(edge.from, forward);

        const backward = incoming.get(edge.to) || [];
        backward.push(edge.from);
        incoming.set(edge.to, backward);
      }

      const queue = [];
      const seedDepth = (id, depth) => {
        if (depthMap[id] === undefined) {
          depthMap[id] = depth;
          queue.push(id);
        }
      };

      if (focusNodeId) {
        seedDepth(focusNodeId, 0);
      }

      while (queue.length > 0) {
        const current = queue.shift();
        const currentDepth = depthMap[current] ?? 0;
        let depth = currentDepth;
        depth += 1;

        const forward = outgoing.get(current) || [];
        for (const target of forward) {
          seedDepth(target, depth);
        }

        const backward = incoming.get(current) || [];
        const prevDepth = currentDepth - 1;
        for (const source of backward) {
          seedDepth(source, prevDepth);
        }
      }

      for (const node of nodes) {
        if (depthMap[node.id] === undefined) {
          depthMap[node.id] = 0;
        }
      }

      const columnCounter = {};
      const layoutNodes = nodes.map(node => {
        const depth = depthMap[node.id] ?? 0;
        const columnIndex = (columnCounter[depth] || 0) + 1;
        columnCounter[depth] = columnIndex;
        return {
          ...node,
          depth,
          column: columnIndex
        };
      });

      return { depthMap, columnCounter, layoutNodes, incoming };
    }

    function layoutGraphNodes(nodes) {
      const spacingX = 140;
      const spacingY = 90;
      const normalized = Array.isArray(nodes) ? nodes : [];
      const depths = normalized.map(node => node.depth ?? 0);
      const minDepth = depths.length === 0 ? 0 : Math.min(0, ...depths);
      const depthShift = minDepth < 0 ? -minDepth : 0;
      const columnHeights = {};
      const layoutNodes = normalized.map(node => {
        const depth = node.depth ?? 0;
        const column = Math.max(1, node.column ?? 1);
        const adjustedDepth = depth + depthShift;
        const x = adjustedDepth * spacingX;
        const baseY = (column - 1) * spacingY;
        const columnKey = `${adjustedDepth}-${column}`;
        const y = columnHeights[columnKey] ?? baseY;
        columnHeights[columnKey] = y + spacingY;
        return {
          ...node,
          x,
          y
        };
      });
      const width = Math.max(0, ...layoutNodes.map(node => node.x)) + spacingX;
      const height = Math.max(0, ...layoutNodes.map(node => node.y)) + spacingY;
      return { layoutNodes, width, height, spacingX, spacingY };
    }

    function buildGraphEdgePaths(layoutNodes, edges = []) {
      const nodeMap = new Map((Array.isArray(layoutNodes) ? layoutNodes : []).map(node => [node.id, node]));
      return edges.map(edge => {
        const from = nodeMap.get(edge.from);
        const to = nodeMap.get(edge.to);
        if (!from || !to) return null;
        const loopback = from.id === to.id;
        const highlightCycle = edge.isCycleEdge === true;
        const startX = from.x + 24;
        const startY = from.y + 24;
        const endX = to.x + 24;
        const endY = to.y + 24;
        let path;
        if (loopback) {
          path = `M${startX} ${startY} c 16 -12 40 -12 40 0`;
        } else if (highlightCycle) {
          const midX = (startX + endX) / 2;
          const midY = Math.min(startY, endY) - 40;
          path = `M${startX} ${startY} Q${midX} ${midY} ${endX} ${endY}`;
        } else {
          path = `M${startX} ${startY} L${endX} ${endY}`;
        }
        return {
          edgeId: edge.id,
          path,
          loopback: loopback || highlightCycle,
          highlightCycle
        };
      }).filter(Boolean);
    }

    function renderMessageGraphSvg(graphView) {
      const nodes = Array.isArray(graphView?.nodes) ? graphView.nodes : [];
      const edges = Array.isArray(graphView?.edges) ? graphView.edges : [];
      const width = typeof graphView?.width === 'number' && graphView.width > 0 ? graphView.width : 400;
      const height = typeof graphView?.height === 'number' && graphView.height > 0 ? graphView.height : 220;
      const viewBoxWidth = Math.max(width, 1);
      const viewBoxHeight = Math.max(height, 1);
      const edgeMarkup = edges.map(edge => {
        const d = escapeHtml(edge.path || 'M0 0 L0 0');
        const classes = ['message__graph-edge'];
        if (edge.loopback) classes.push('message__graph-edge--loopback');
        if (edge.highlightCycle) classes.push('message__graph-edge--cycle');
        return `<path class="${classes.join(' ')}" data-edge-id="${escapeHtml(edge.edgeId || edge.id || '')}" data-loopback="${edge.loopback ? '1' : '0'}" d="${d}"></path>`;
      }).join('');
      const nodeMarkup = nodes.map(node => {
        const cx = typeof node.x === 'number' ? node.x : 0;
        const cy = typeof node.y === 'number' ? node.y : 0;
        return `<circle class="message__graph-node" data-node-id="${escapeHtml(node.id || '')}" cx="${cx}" cy="${cy}" r="6"></circle>`;
      }).join('');
      return `
        <svg class="message__graph-svg" viewBox="0 0 ${viewBoxWidth} ${viewBoxHeight}" width="${viewBoxWidth}" height="${viewBoxHeight}" role="presentation" xmlns="http://www.w3.org/2000/svg">
          ${edgeMarkup}
          ${nodeMarkup}
        </svg>
      `;
    }

    function renderMessageGraphCanvas(callGraph, messageId = '') {
      const graphView = selectCoreGraph(callGraph);
      const depthInfo = graphView && graphView.nodes.length > 0
        ? assignGraphDepths(graphView.nodes, graphView.edges, graphView.focusNodeId)
        : null;
      const layoutInfo = depthInfo ? layoutGraphNodes(depthInfo.layoutNodes) : { layoutNodes: [], width: 0, height: 0 };
      const edgePaths = graphView ? buildGraphEdgePaths(layoutInfo.layoutNodes, graphView.edges) : [];
      const messageAttr = messageId ? ` data-message-id="${escapeHtml(messageId)}"` : '';
      return `
        <div
          class="message__graph-canvas-wrap"
          data-graph-canvas${messageAttr}
          onpointerdown="handleMiniGraphPointerDown(event)"
          onpointermove="handleMiniGraphPointerMove(event)"
          onpointerup="handleMiniGraphPointerUp(event)"
        >
          <div class="message__graph-toolbar">
            <button type="button" class="message__graph-btn" data-action="expand-call-graph">展开</button>
            <button type="button" class="message__graph-btn" data-action="reset-call-graph-view">重置</button>
          </div>
          ${renderMessageGraphSvg({ nodes: layoutInfo.layoutNodes, edges: edgePaths })}
        </div>
      `;
    }

    function handleMiniGraphPointerDown(event) {
      if (event && typeof event.preventDefault === 'function') {
        event.preventDefault();
      }
    }

    function handleMiniGraphPointerMove(event) {
      event?.preventDefault && event.preventDefault();
    }

    function handleMiniGraphPointerUp(event) {
      event?.preventDefault && event.preventDefault();
    }

    function renderMessageGraphSummary(callGraph) {
      if (!callGraph) return '';

      const cycleBadge = callGraph.hasCycle
        ? '<span class="message__graph-badge message__graph-badge--cycle">含环</span>'
        : '';
      const truncatedBadge = callGraph.truncated
        ? '<span class="message__graph-badge">已裁剪</span>'
        : '';

      return `
        <div class="message__graph-summary">
          <span class="message__graph-badge">调用图 ${escapeHtml(String(callGraph.summary.nodeCount))} 节点</span>
          ${cycleBadge}
          ${truncatedBadge}
          <button class="message__graph-toggle" type="button" data-action="toggle-call-graph">展开</button>
        </div>
      `;
    }

    function renderMessageGraphPanel(callGraph, messageId = '') {
      if (!callGraph) return '';

      const participantText = Array.isArray(callGraph.summary.participantNames) && callGraph.summary.participantNames.length > 0
        ? `参与者 ${escapeHtml(callGraph.summary.participantNames.join(' / '))}`
        : '参与者未知';
      const cycleText = callGraph.hasCycle ? ` · 含 ${escapeHtml(String(callGraph.summary.cycleCount || 1))} 个环` : '';
      const truncatedText = callGraph.truncated ? ` · 已折叠 ${escapeHtml(String(callGraph.summary.truncatedNodeCount || 0))} 个节点` : '';
      const miniGraphMarkup = renderMessageGraphCanvas(callGraph, messageId);

      return `
        <div class="message__graph-panel" hidden>
          <div class="message__graph-meta">
            ${escapeHtml(String(callGraph.summary.nodeCount))} 节点 · ${escapeHtml(String(callGraph.summary.edgeCount))} 边 · ${participantText}${cycleText}${truncatedText}
          </div>
          <div class="message__graph-details-title">查看结构详情</div>
          <div class="message__graph-mini">
            ${miniGraphMarkup}
          </div>
          <div class="message__graph-details">
            ${renderGraphDetailGroups(callGraph)}
          </div>
        </div>
      `;
    }

    function renderMessage(msg, options = {}) {
      const isUser = msg.role === 'user';
      const isInvocationReview = msg.messageSubtype === 'invocation_review';
      const roleClass = isUser ? 'message--user' : 'message--assistant';
      const senderColor = getSenderColor(msg.sender, msg.role);
      const avatar = getSenderAvatar(msg.sender, msg.role);
      const extraClass = options.streamingAgentName ? ' message--streaming' : '';
      const extraAttrs = options.streamingAgentName
        ? ` data-agent="${escapeHtml(options.streamingAgentName)}"`
        : '';

      const colorStyle = senderColor ? `style="--sender-color: ${senderColor}"` : '';

      let content = '';
      const renderedMarkdown = window.ChatMarkdown.renderMarkdownHtml(msg.text || '', {
        role: msg.role || 'assistant',
        enableMentions: true
      });
      if (isUser) {
        content = `
          <div class="message__text message__text--markdown">${renderedMarkdown}</div>
          ${renderMessageGraphSummary(msg.callGraph)}
          ${renderMessageGraphPanel(msg.callGraph, msg.id)}
        `;
      } else {
        if (isInvocationReview) {
          content = `
            ${renderInvocationReviewMessageContent(msg, colorStyle)}
            ${renderMessageGraphSummary(msg.callGraph)}
            ${renderMessageGraphPanel(msg.callGraph, msg.id)}
          `;
        } else {
          content = `
            <div class="message__sender" ${colorStyle}>${escapeHtml(msg.sender || 'AI')}</div>
            <div class="message__text message__text--markdown">${renderedMarkdown}</div>
            <div class="message__blocks">${renderBlocks(msg.blocks)}</div>
            ${renderMessageGraphSummary(msg.callGraph)}
            ${renderMessageGraphPanel(msg.callGraph, msg.id)}
          `;
        }
      }

      return `
        <div class="message ${roleClass}${extraClass}"${extraAttrs} ${colorStyle} data-message-id="${escapeHtml(msg.id || '')}">
          <div class="message__avatar">${avatar}</div>
          <div class="message__content">${content}</div>
        </div>
      `;
    }

    function renderLoading(agentName) {

      const color = agent ? agent.color : 'var(--accent)';

      return `
        <div class="message message--assistant message--loading" style="--sender-color: ${color}">
          <div class="message__avatar">${avatar}</div>
          <div class="message__content">
            <div class="message__sender" style="--sender-color: ${color}">${agentName}</div>
            <div class="message__text">
              <span class="loading-dots">
                <span></span><span></span><span></span>
              </span>
            </div>
          </div>
        </div>

    }

            <span id="pwaBannerText">安装 agent-co 到主屏幕，获得更好的 iOS 全屏体验。</span>
            <div class="pwa-banner__actions">

              <button class="btn-clear" onclick="window.dismissPwaBanner && window.dismissPwaBanner()">关闭</button>

    function renderDiscussionPauseCard() {

          <h2>讨论已暂停</h2>

    function syncMessageChromeState() {
      cacheMessageChromeElements();
      updateCurrentAgentUI();
      if (localStorage.getItem('pwa-banner-dismissed') !== '1' && !isStandaloneMode() && pwaBannerEl) {
        pwaBannerEl.style.display = 'flex';
        if (isIOS() && pwaBannerTextEl) {

    function renderMessages() {
      let markup = renderMessageIntro();

      if (history.length === 0 && enabledAgents.size === 0 && !(discussionMode === 'peer' && discussionState === 'paused')) {
        messagesEl.innerHTML = markup + renderEmptyState();
        syncMessageChromeState();
        return;
      }

      history.forEach(msg => {
        markup += renderMessage(msg);
      });
      if (discussionMode === 'peer' && discussionState === 'paused') {
        markup += renderDiscussionPauseCard();
      }
      messagesEl.innerHTML = markup;
      if (history.length === 0 && !(discussionMode === 'peer' && discussionState === 'paused')) {

    function appendMessageMarkup(markup) {
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();
      messagesEl.insertAdjacentHTML('beforeend', markup);
      cacheMessageChromeElements();
      updateCurrentAgentUI();
      scrollToBottom();

    function addMessage(msg) {
      appendMessageMarkup(renderMessage(msg));

    function findStreamingAgentMessage(agentName) {
      return Array.from(messagesEl.querySelectorAll('.message--streaming'))

    function appendStreamingAgentDelta(agentName, delta) {
      if (!delta) return;

      let streamingEl = findStreamingAgentMessage(agentName);
      if (!streamingEl) {
        hideThinkingIndicator(agentName);
        appendMessageMarkup(renderMessage({
          role: 'assistant',
          sender: agentName,
          text: ''
        }, { streamingAgentName: agentName }));
        streamingEl = findStreamingAgentMessage(agentName);
      }

      const nextText = `${streamingAgentTexts.get(agentName) || ''}${delta}`;
      streamingAgentTexts.set(agentName, nextText);
      const textEl = streamingEl ? streamingEl.querySelector('.message__text--markdown') : null;
      if (textEl) {
        textEl.innerHTML = window.ChatMarkdown.renderMarkdownHtml(nextText, {
          role: 'assistant',
          enableMentions: true
        });
      }
      scrollToBottom();

    function finalizeStreamingAgentMessage(message) {
      const streamingEl = findStreamingAgentMessage(message.sender);
      streamingAgentTexts.delete(message.sender);
      if (!streamingEl) {

      streamingEl.outerHTML = renderMessage(message);
      cacheMessageChromeElements();
      updateCurrentAgentUI();
      scrollToBottom();

    async function recoverViaDirectChat(text) {

        return false;
      }
    }

    function normalizeStreamErrorMessage(error) {
      const raw = String(error || '');
      const normalized = raw.toLowerCase();
      if (
        normalized.includes('deactivated_workspace') ||
        normalized.includes('payment required') ||
        normalized.includes('auth error') ||
        normalized.includes('unauthorized') ||
        normalized.includes('forbidden') ||
        normalized.includes('402')
      ) {
        return '账号或工作区异常：请检查 Codex 登录状态、套餐/额度或 workspace 是否已恢复';
      }
      return raw || '连接失败';
    }

    async function sendMessage(event) {
      event.preventDefault();

      if (authEnabled && !isAuthenticated) {
        showLoginOverlay();
        return;
      }

      if (isLoading) return;

      const text = userInputEl.value.trim();
      if (!text) return;

      userInputEl.value = '';
      resizeUserInput();
      if (window.ChatComposer && typeof window.ChatComposer.refreshPreview === 'function') {
        window.ChatComposer.refreshPreview();
      }
      if (window.ChatComposer && typeof window.ChatComposer.closeMobileComposerDrawer === 'function') {
        window.ChatComposer.closeMobileComposerDrawer();
      }
      clearResumeChainNotice();

      const userMsg = { role: 'user', sender: '用户', text: text };
      addMessage(userMsg);
      history.push(userMsg);

      isLoading = true;
      sendBtnEl.disabled = true;
      sendBtnEl.textContent = '...';
      statusEl.textContent = '发送中...';
      syncStopActionButtons();

      const thinkingAgents = new Set();
      let streamReceivedAgentMessage = false;
      let streamReceivedAgentDelta = false;
      let streamReceivedError = false;
      let streamStoppedByUser = false;
      let streamResumeAvailable = false;

      try {
        const response = await fetch('/api/chat-stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ message: text })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          let eventType = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) {
              eventType = line.substring(7).trim();
            } else if (line.startsWith('data: ')) {
              const dataStr = line.substring(6);
              try {
                const data = JSON.parse(dataStr);

                if (eventType === 'user_message') {
                  statusEl.textContent = '处理中...';
                } else if (eventType === 'agent_thinking') {
                  const agentName = data.agent;
                  thinkingAgents.add(agentName);
                  statusEl.textContent = `${agentName} 思考中...`;
                  showThinkingIndicator(agentName);
                } else if (eventType === 'agent_delta') {
                  streamReceivedAgentDelta = true;
                  appendStreamingAgentDelta(data.agent, data.delta || '');
                  statusEl.textContent = `${data.agent} 回复中...`;
                } else if (eventType === 'agent_message') {
                  streamReceivedAgentMessage = true;
                  thinkingAgents.delete(data.sender);
                  hideThinkingIndicator(data.sender);
                  history.push(data);
                  finalizeStreamingAgentMessage(data);
                  statusEl.textContent = thinkingAgents.size > 0
                    ? `${Array.from(thinkingAgents).join(', ')} 思考中...`
                    : '已连接';
                } else if (eventType === 'done') {
                  currentAgent = data.currentAgent || null;
                  currentAgentWillExpire = false;
                  updateCurrentAgentUI();
                } else if (eventType === 'notice') {
                  showSystemNotice(data.notice);
                } else if (eventType === 'execution_stopped') {
                  streamStoppedByUser = true;
                  streamResumeAvailable = data.resumeAvailable === true;
                  thinkingAgents.clear();
                  document.querySelectorAll('.message--thinking').forEach(el => el.remove());
                  currentAgent = data.currentAgent || null;
                  currentAgentWillExpire = false;
                  updateCurrentAgentUI();
                  statusEl.textContent = streamResumeAvailable ? '执行已停止，可继续剩余执行' : '执行已停止';
                  if (streamResumeAvailable) {
                    showResumeChainNotice();
                  } else {
                    clearResumeChainNotice();
                  }
                } else if (eventType === 'error') {
                  streamReceivedError = true;
                  statusEl.textContent = '连接失败';
                  const message = normalizeStreamErrorMessage(data.error);
                  addMessage({
                    role: 'assistant',
                    sender: '系统',
                    text: `❌ 错误: ${message}`
                  });
                }
              } catch (e) {
                console.error('解析 SSE 数据失败:', e);
              }
              eventType = '';
            }
          }
        }

        if (!streamReceivedAgentMessage && !streamReceivedError) {
          if (!streamStoppedByUser && !streamReceivedAgentDelta) {
            statusEl.textContent = '连接失败';
            addMessage({
              role: 'assistant',
              sender: '系统',
              text: '❌ 智能体未返回可见消息，请稍后重试或查看日志'
            });
          }
        }

      } catch (error) {
        console.error('发送失败:', error);
        if (!streamStoppedByUser) {
          if (!streamReceivedAgentMessage) {
            if (!streamReceivedAgentDelta) {
              statusEl.textContent = '流式连接失败，尝试降级...';
              const recovered = await recoverViaDirectChat(text);
              if (!recovered) {
                statusEl.textContent = '连接失败';
                addMessage({
                  role: 'assistant',
                  sender: '系统',
                  text: `❌ 发送失败: ${error.message}`
                });
              }
            } else {
              statusEl.textContent = '连接中断';
              showResumeChainNotice();
            }
          } else {
            statusEl.textContent = '连接中断';
            showResumeChainNotice();
          }
        } else if (streamResumeAvailable) {
          showResumeChainNotice();
        }
      } finally {
        isLoading = false;
        isStopRequestInFlight = false;
        sendBtnEl.disabled = false;
        sendBtnEl.textContent = '发送';
        syncStopActionButtons();
        streamingAgentTexts.clear();
        document.querySelectorAll('.message--streaming').forEach(el => el.classList.remove('message--streaming'));
        document.querySelectorAll('.message--thinking').forEach(el => el.remove());
      }
    }

        alert(error.message || '生成摘要失败');

    }

        setTimeout(() => hideMentionSuggestions(), 120);
      });

      userInputEl.addEventListener('keydown', (e) => {
        if (mentionState.visible && mentionState.items.length > 0) {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            mentionState.selectedIndex = (mentionState.selectedIndex + 1) % mentionState.items.length;
            renderMentionSuggestions();
            return;
          }

          if (e.key === 'ArrowUp') {
            e.preventDefault();
            mentionState.selectedIndex = (mentionState.selectedIndex - 1 + mentionState.items.length) % mentionState.items.length;
            renderMentionSuggestions();
            return;
          }

          if (e.key === 'Enter' || e.key === 'Tab') {
            e.preventDefault();
            applyMentionSuggestion(mentionState.selectedIndex);
            return;
          }

          if (e.key === 'Escape') {
            e.preventDefault();
            hideMentionSuggestions();
            return;
          }
        }

        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage(e);
        }

        const messageEl = target.closest('[data-message-id]');

        if (!panel) return;

        const willOpen = panel.hasAttribute('hidden');

        document.querySelectorAll('[data-action="toggle-call-graph"]').forEach((button) => {

          panel.setAttribute('hidden', '');
          return;
        }

        panel.removeAttribute('hidden');
        target.textContent = '收起';
      });
    }

            });
          })
          .catch((err) => {
            console.warn('Service Worker 注册失败', err);
          });
      }

      setupPwaBanner();
      if (deferredInstallPrompt) {
        showPwaInstallButton();
      }

      if (isStandaloneMode()) {
        document.body.classList.add('is-standalone');
      }
    });

    function showPwaInstallButton() {
      if (!pwaInstallBtnEl) return;
      pwaInstallBtnEl.style.display = 'inline-flex';
    }

    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      showPwaInstallButton();
      setupPwaBanner();
    });

  </script>
</body>
</html>
