<svg xmlns="http://www.w3.org/2000/svg" width="760" height="200" viewBox="0 0 760 200" role="img" aria-label="agent-co logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="orb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#312e81" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="22" y="24" width="156" height="156" rx="40" fill="url(#bg)"/>
  </g>

  <g>
    <circle cx="70" cy="100" r="14" fill="#ffffff" opacity="0.96"/>
    <circle cx="112" cy="62" r="14" fill="#ffffff" opacity="0.96"/>
    <circle cx="130" cy="132" r="14" fill="#ffffff" opacity="0.96"/>

    <path d="M70 100 L112 62 L130 132 Z" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>

    <circle cx="70" cy="100" r="28" fill="none" stroke="url(#orb)" stroke-width="6" opacity="0.95"/>
    <circle cx="112" cy="62" r="28" fill="none" stroke="url(#orb)" stroke-width="6" opacity="0.8"/>
    <circle cx="130" cy="132" r="28" fill="none" stroke="url(#orb)" stroke-width="6" opacity="0.72"/>
  </g>

  <g font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif">
    <text x="212" y="98" font-size="64" font-weight="800" fill="#111827" letter-spacing="-1.8">agent<tspan fill="url(#bg)">-co</tspan></text>
    <text x="214" y="132" font-size="16" font-weight="600" fill="#6b7280" letter-spacing="4">MULTI-AGENT COLLABORATION</text>
  </g>

  <g opacity="0.55">
    <circle cx="216" cy="158" r="3" fill="#4f46e5"/>
    <circle cx="230" cy="158" r="3" fill="#7c3aed"/>
    <circle cx="244" cy="158" r="3" fill="#06b6d4"/>
  </g>
</svg>
