<svg xmlns="http://www.w3.org/2000/svg" width="640" height="180" viewBox="0 0 640 180" role="img" aria-label="Bot Room Logo">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon circle background -->
  <circle cx="90" cy="90" r="70" fill="url(#g1)" filter="url(#shadow)"/>

  <!-- Bot head -->
  <rect x="52" y="56" width="76" height="60" rx="22" fill="#fff" opacity="0.95"/>

  <!-- Antenna -->
  <rect x="84" y="32" width="12" height="28" rx="6" fill="#fff" opacity="0.9"/>
  <circle cx="90" cy="28" r="8" fill="#fbbf24"/>

  <!-- Eyes -->
  <circle cx="74" cy="82" r="8" fill="#6366f1"/>
  <circle cx="106" cy="82" r="8" fill="#6366f1"/>
  <circle cx="76" cy="80" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="108" cy="80" r="3" fill="#fff" opacity="0.8"/>

  <!-- Mouth -->
  <rect x="76" y="98" width="28" height="6" rx="3" fill="#a78bfa"/>

  <!-- Chat bubbles -->
  <rect x="128" y="50" width="28" height="20" rx="8" fill="url(#g3)" opacity="0.7"/>
  <circle cx="148" cy="66" r="3" fill="url(#g3)" opacity="0.5"/>
  <circle cx="154" cy="70" r="2" fill="url(#g3)" opacity="0.3"/>

  <rect x="132" y="100" width="22" height="16" rx="7" fill="url(#g2)" opacity="0.6"/>
  <circle cx="150" cy="113" r="2.5" fill="url(#g2)" opacity="0.4"/>

  <!-- Text: Bot -->
  <text x="195" y="108" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#1e1b4b" letter-spacing="-2">
    Bot<tspan fill="url(#g1)">Room</tspan>
  </text>

  <!-- Tagline -->
  <text x="198" y="138" font-family="'SF Pro Text', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#6b7280" letter-spacing="4">
    MULTI-AGENT CHAT
  </text>

  <!-- Decorative dots -->
  <circle cx="198" cy="160" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="212" cy="160" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="226" cy="160" r="3" fill="#a78bfa" opacity="0.4"/>
</svg>
