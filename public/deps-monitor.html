<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>运维日志与依赖监控</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-soft: #162238;
      --text: #e5edf9;
      --muted: #8fa0bf;
      --border: #243553;
      --accent: #60a5fa;
      --accent-soft: rgba(96, 165, 250, 0.18);
      --ok: #34d399;
      --bad: #f87171;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1a2740 0%, var(--bg) 55%);
      color: var(--text);
    }

    .page {
      max-width: 1320px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .topbar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 650;
      letter-spacing: 0.2px;
    }

    .title-wrap p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .btn {
      background: var(--accent);
      color: #071326;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-weight: 650;
      cursor: pointer;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .summary {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .status-ok { color: var(--ok); font-weight: 700; }
    .status-bad { color: var(--bad); font-weight: 700; }

    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    th {
      background: #0d1626;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.35px;
      font-size: 12px;
    }

    tr:nth-child(even) td {
      background: rgba(22, 34, 56, 0.45);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 650;
    }

    .pill.ok {
      background: rgba(52, 211, 153, 0.16);
      color: var(--ok);
    }

    .pill.bad {
      background: rgba(248, 113, 113, 0.16);
      color: var(--bad);
    }

    @media (max-width: 900px) {
      .page { padding: 14px; }
      table { font-size: 12px; }
      th, td { padding: 8px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="title-wrap">
        <h1>运维日志与依赖监控</h1>
        <p>统一风格展示 Redis 等依赖的实时健康状态。</p>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn" onclick="window.open('/verbose-logs.html', '_blank')">CLI日志</button>
        <button id="refresh" class="btn">刷新</button>
      </div>
    </header>

    <section class="card">
      <div id="summary" class="summary">加载中...</div>
      <table>
        <thead>
          <tr><th>依赖</th><th>必需</th><th>状态</th><th>详情</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </div>

  <script>
    const summary = document.getElementById('summary');
    const rows = document.getElementById('rows');
    const refresh = document.getElementById('refresh');

    function yn(v) { return v ? '是' : '否'; }
    function cls(v) { return v ? 'ok' : 'bad'; }
    function text(v) { return v ? '正常' : '异常'; }
    function summaryClass(v) { return v ? 'status-ok' : 'status-bad'; }

    async function loadStatus() {
      summary.textContent = '加载中...';
      rows.innerHTML = '';
      try {
        const res = await fetch('/api/dependencies/status');
        const data = await res.json();
        const checkedAt = data.checkedAt ? new Date(data.checkedAt).toLocaleString() : '-';
        const healthy = !!data.healthy;
        summary.innerHTML = `总体状态：<span class="${summaryClass(healthy)}">${healthy ? '健康' : '异常'}</span>，检查时间：${checkedAt}`;

        for (const item of (data.dependencies || [])) {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${item.name}</td>
            <td>${yn(item.required)}</td>
            <td><span class="pill ${cls(item.healthy)}">${text(item.healthy)}</span></td>
            <td>${item.detail || '-'}</td>
          `;
          rows.appendChild(tr);
        }
      } catch (error) {
        summary.innerHTML = `<span class="status-bad">加载失败：${error.message}</span>`;
      }
    }

    refresh.addEventListener('click', loadStatus);
    loadStatus();
    setInterval(loadStatus, 10000);
  </script>
</body>
</html>
