<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>运维日志与依赖监控</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-soft: #162238;
      --text: #e5edf9;
      --muted: #8fa0bf;
      --border: #243553;
      --accent: #60a5fa;
      --accent-soft: rgba(96, 165, 250, 0.18);
      --ok: #34d399;
      --bad: #f87171;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1a2740 0%, var(--bg) 55%);
      color: var(--text);
    }

    .page {
      max-width: 1320px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .topbar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 650;
      letter-spacing: 0.2px;
    }

    .title-wrap p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .btn {
      background: var(--accent);
      color: #071326;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-weight: 650;
      cursor: pointer;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .summary {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .status-ok { color: var(--ok); font-weight: 700; }
    .status-bad { color: var(--bad); font-weight: 700; }

    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    th {
      background: #0d1626;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.35px;
      font-size: 12px;
    }

    tr:nth-child(even) td {
      background: rgba(22, 34, 56, 0.45);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 650;
    }

    .pill.ok {
      background: rgba(52, 211, 153, 0.16);
      color: var(--ok);
    }

    .pill.bad {
      background: rgba(248, 113, 113, 0.16);
      color: var(--bad);
    }

    .pill.info {
      background: rgba(96, 165, 250, 0.16);
      color: var(--accent);
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: #c7d6f3;
    }

    @media (max-width: 900px) {
      .page { padding: 14px; }
      table { font-size: 12px; }
      th, td { padding: 8px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="title-wrap">
        <h1>运维日志与依赖监控</h1>
        <p>统一风格展示依赖实时状态与最近运维日志。</p>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn" onclick="window.open('/verbose-logs.html', '_blank')">CLI日志</button>
        <button id="refresh" class="btn">刷新</button>
      </div>
    </header>

    <section class="card">
      <div id="summary" class="summary">加载中...</div>
      <table>
        <thead>
          <tr><th>依赖</th><th>必需</th><th>状态</th><th>详情</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>

    <section class="card">
      <div id="log-summary" class="summary">最近日志：加载中...</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items:flex-end;">
        <label style="font-size:12px; color:var(--muted);">开始日期
          <input id="filter-start" type="date" style="display:block; margin-top:4px; background:#0d1626; color:var(--text); border:1px solid var(--border); border-radius:6px; padding:6px;">
        </label>
        <label style="font-size:12px; color:var(--muted);">结束日期
          <input id="filter-end" type="date" style="display:block; margin-top:4px; background:#0d1626; color:var(--text); border:1px solid var(--border); border-radius:6px; padding:6px;">
        </label>
        <label style="font-size:12px; color:var(--muted);">关键字
          <input id="filter-keyword" type="text" placeholder="如 timeout / refused" style="display:block; margin-top:4px; background:#0d1626; color:var(--text); border:1px solid var(--border); border-radius:6px; padding:6px; min-width:220px;">
        </label>
        <button id="apply-filter" class="btn" type="button">查询日志</button>
      </div>
      <table>
        <thead>
          <tr><th>时间</th><th>级别</th><th>依赖</th><th>日志内容</th></tr>
        </thead>
        <tbody id="log-rows"></tbody>
      </table>
    </section>
  </div>

  <script>
    const summary = document.getElementById('summary');
    const rows = document.getElementById('rows');
    const refresh = document.getElementById('refresh');
    const logSummary = document.getElementById('log-summary');
    const logRows = document.getElementById('log-rows');
    const filterStart = document.getElementById('filter-start');
    const filterEnd = document.getElementById('filter-end');
    const filterKeyword = document.getElementById('filter-keyword');
    const applyFilter = document.getElementById('apply-filter');

    function yn(v) { return v ? '是' : '否'; }
    function cls(v) { return v ? 'ok' : 'bad'; }
    function text(v) { return v ? '正常' : '异常'; }
    function summaryClass(v) { return v ? 'status-ok' : 'status-bad'; }
    function levelClass(level) { return level === 'error' ? 'bad' : 'info'; }
    function levelText(level) { return level === 'error' ? '异常' : '信息'; }

    function renderLogs(logs) {
      logRows.innerHTML = '';
      logSummary.textContent = `最近日志：${logs.length} 条`;

      if (logs.length === 0) {
        const emptyTr = document.createElement('tr');
        emptyTr.innerHTML = '<td colspan="4">暂无依赖日志</td>';
        logRows.appendChild(emptyTr);
        return;
      }

      for (const log of logs) {
        const tr = document.createElement('tr');
        const time = log.timestamp ? new Date(log.timestamp).toLocaleString() : '-';
        tr.innerHTML = `
          <td class="mono">${time}</td>
          <td><span class="pill ${levelClass(log.level)}">${levelText(log.level)}</span></td>
          <td>${log.dependency || '-'}</td>
          <td class="mono">${log.message || '-'}</td>
        `;
        logRows.appendChild(tr);
      }
    }

    async function loadLogsWithFilters() {
      const params = new URLSearchParams();
      if (filterStart.value) params.set('startDate', filterStart.value);
      if (filterEnd.value) params.set('endDate', filterEnd.value);
      if (filterKeyword.value.trim()) params.set('keyword', filterKeyword.value.trim());
      params.set('limit', '500');

      const query = params.toString();
      const url = query ? `/api/dependencies/logs?${query}` : '/api/dependencies/logs';
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data?.error || '查询依赖日志失败');
      }
      renderLogs(Array.isArray(data.logs) ? data.logs : []);
    }

    async function loadStatus() {
      summary.textContent = '加载中...';
      rows.innerHTML = '';
      try {
        const res = await fetch('/api/dependencies/status');
        const data = await res.json();
        const checkedAt = data.checkedAt ? new Date(data.checkedAt).toLocaleString() : '-';
        const healthy = !!data.healthy;
        summary.innerHTML = `总体状态：<span class="${summaryClass(healthy)}">${healthy ? '健康' : '异常'}</span>，检查时间：${checkedAt}`;

        for (const item of (data.dependencies || [])) {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${item.name}</td>
            <td>${yn(item.required)}</td>
            <td><span class="pill ${cls(item.healthy)}">${text(item.healthy)}</span></td>
            <td>${item.detail || '-'}</td>
          `;
          rows.appendChild(tr);
        }

        await loadLogsWithFilters();
      } catch (error) {
        summary.innerHTML = `<span class="status-bad">加载失败：${error.message}</span>`;
        logSummary.textContent = '最近日志：加载失败';
      }
    }

    refresh.addEventListener('click', loadStatus);
    applyFilter.addEventListener('click', loadLogsWithFilters);
    loadStatus();
    setInterval(loadStatus, 10000);
  </script>
</body>
</html>
