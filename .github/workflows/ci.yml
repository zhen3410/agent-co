name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Redis
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server redis-tools

      - name: Start Redis
        run: |
          sudo systemctl start redis-server.service
          redis-cli PING

      - name: Run tests
        run: npm test
